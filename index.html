<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kryon Algo Trade Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0c0f17;
            --card-bg: #161a24;
            --accent: #00f281;
            --text-main: #ffffff;
            --text-gray: #7a828a;
            --border: #232a35;
            --danger: #ff4b5c;
            --warning: #ff9d00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- HEADER (СТИЛЬ ИЗ ВИДЕО) --- */
        .app-header {
            padding: 20px 15px 15px;
            text-align: center;
            background: linear-gradient(to bottom, #11151e, var(--bg-color));
            border-bottom: 1px solid var(--border);
        }
        .header-logo {
            width: 36px; height: 36px;
            background: var(--card-bg);
            border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid var(--accent);
            margin-bottom: 8px; color: var(--accent); font-size: 20px;
            box-shadow: 0 0 15px rgba(0, 242, 129, 0.15);
        }
        .app-title { font-size: 20px; font-weight: 800; margin: 0; letter-spacing: 0.5px; }
        .app-subtitle { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
        
        .steps-bar {
            display: inline-flex; gap: 15px;
            background: #11151e; padding: 6px 16px;
            border-radius: 20px; font-size: 11px; color: var(--text-gray);
            margin-top: 15px; font-weight: bold; border: 1px solid #1a1f29;
        }
        .steps-bar span.active { color: var(--text-main); display: flex; align-items: center; gap: 5px; }
        .steps-bar span.active::before { content: '●'; color: var(--accent); }

        /* --- CONTENT --- */
        .content { flex: 1; padding: 15px; padding-bottom: 110px; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UPLOAD AREA */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 24px;
            padding: 50px 15px;
            text-align: center;
            background: rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        #main-canvas { width: 100%; border-radius: 12px; display: none; margin-top: 10px; }
        .scan-line { position: absolute; left: 0; width: 100%; height: 3px; background: var(--accent); box-shadow: 0 0 20px var(--accent); display: none; z-index: 10; }
        .analysis-log { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 9px; color: var(--accent); text-align: left; z-index: 11; display: none; }

        /* RESULT CARD */
        .result-card { background: var(--card-bg); border-radius: 24px; padding: 30px 20px; text-align: center; border: 2px solid var(--border); }
        .signal-val { font-size: 48px; font-weight: 900; margin: 15px 0; letter-spacing: 1px; }
        
        .analysis-box {
            background: #11151e;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            border-left: 3px solid var(--accent);
        }
        .analysis-item { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; color: var(--text-gray); }
        .analysis-item b { color: #fff; }

        /* BUTTONS */
        .btn-main {
            width: 100%;
            padding: 20px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0, 242, 129, 0.3);
            transition: 0.2s;
            margin-top: 20px;
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { background: #232a35; color: #555; box-shadow: none; }

        /* NAVBAR (ИЗ ВИДЕО) */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%;
            background: #11151e;
            display: flex; justify-content: space-around;
            padding: 15px 0 35px 0;
            border-top: 1px solid var(--border);
            z-index: 1000;
        }
        .nav-item { color: var(--text-gray); display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-logo">📈</div>
        <h1 class="app-title">Kryon Algo Trade Bot</h1>
        <p class="app-subtitle">Advanced AI Vision Analysis</p>
        <div class="steps-bar">
            <span id="step-upload" class="active">Upload</span>
            <span id="step-result">Signal</span>
        </div>
    </div>

    <div class="content">
        <!-- ЭКРАН 1: ЗАГРУЗКА И АНАЛИЗ -->
        <div id="screen-upload" class="screen active">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div id="placeholder">
                    <div style="font-size: 50px; margin-bottom: 15px;">📁</div>
                    <div style="font-weight: 800; font-size: 18px;">UPLOAD SCREENSHOT</div>
                    <div style="font-size: 11px; color: var(--text-gray); margin-top: 8px;">AI scans history and detects trend exhaustion</div>
                </div>
                <div class="analysis-log" id="analysisLog"></div>
                <div class="scan-line" id="scanLine"></div>
                <canvas id="main-canvas"></canvas>
            </div>
            
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="window.handleImage(this)">
            
            <button id="visionBtn" class="btn-main" style="display:none;" onclick="window.performUltraAnalysis()">
                Start Neural Scan
            </button>
            
            <button class="lang-btn" style="margin: 25px auto 0; display: block; background:none; border:1px solid var(--border); color:#fff; padding:8px 15px; border-radius:8px; font-size:12px;" onclick="window.toggleLang()">
                RU / EN
            </button>
        </div>

        <!-- ЭКРАН 2: РЕЗУЛЬТАТ -->
        <div id="screen-result" class="screen">
            <div class="result-card" id="resBorder">
                <div style="color: var(--text-gray); font-size: 11px; letter-spacing: 1px;">KRYON AI ULTRA ANALYZER</div>
                <div id="resSignal" class="signal-val">---</div>
                <div id="resAccuracy" style="font-size: 20px; font-weight: bold; color: var(--accent);">Confidence: --%</div>
                
                <div class="analysis-box">
                    <div class="analysis-item"><span>Market Phase:</span> <b id="trend-status">---</b></div>
                    <div class="analysis-item"><span>Impulse Zone:</span> <b id="impulse-zone">---</b></div>
                    <div class="analysis-item"><span>Rec. Time:</span> <b id="rec-time">---</b></div>
                </div>
            </div>
            
            <button class="btn-main" style="margin-top: 25px; background: #232a35; color: #fff;" onclick="location.reload()">
                New Analysis
            </button>
        </div>
    </div>

    <!-- NAVBAR (ИЗ ВИДЕО) -->
    <div class="nav-bar">
        <div class="nav-item active">
            <div class="nav-icon">⚡</div><span>Signals</span>
        </div>
        <div class="nav-item" onclick="tg.showAlert('Coming Soon')">
            <div class="nav-icon">🎓</div><span>Learn</span>
        </div>
        <div class="nav-item" onclick="tg.showAlert('Coming Soon')">
            <div class="nav-icon">🏆</div><span>Top</span>
        </div>
        <div class="nav-item" onclick="tg.showAlert('Coming Soon')">
            <div class="nav-icon">⚙️</div><span>Settings</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#11151e";

        window.lang = 'en';
        let canvas = document.getElementById('main-canvas');
        let ctx = canvas.getContext('2d', { willReadFrequently: true });

        const trans = {
            ru: {
                up_t: "ЗАГРУЗИТЬ СКРИНШОТ", up_d: "ИИ анализирует историю и перегрев тренда",
                btn_scan: "Начать анализ", up: "ВВЕРХ 🟢", down: "ВНИЗ 🔴",
                follow: "По тренду", reversal: "РАЗВОРОТ (Перегрев)",
                normal: "Нормальный", overheated: "ПЕРЕГРЕТ",
                log1: "> Считывание пикселей...", log2: "> Анализ зон...", log3: "> Поиск уровней...", log4: "> Проверка импульса...", log5: "> Итоговый расчет..."
            },
            en: {
                up_t: "UPLOAD SCREENSHOT", up_d: "AI scans history and detects trend exhaustion",
                btn_scan: "Start Neural Scan", up: "CALL 🟢", down: "PUT 🔴",
                follow: "Trend Following", reversal: "REVERSAL (Overheated)",
                normal: "Normal", overheated: "BURST DETECTED",
                log1: "> Reading pixels...", log2: "> Zone analysis...", log3: "> Level detection...", log4: "> Impulse check...", log5: "> Finalizing..."
            }
        };

        window.toggleLang = function() {
            window.lang = window.lang === 'en' ? 'ru' : 'en';
            const t = trans[window.lang];
            document.getElementById('t-upload-title').innerText = t.up_t;
            document.getElementById('t-upload-desc').innerText = t.up_d;
            document.getElementById('visionBtn').innerText = t.btn_scan;
            tg.HapticFeedback.impactOccurred('light');
        };

        window.handleImage = function(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    canvas.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('visionBtn').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.performUltraAnalysis = async function() {
            const btn = document.getElementById('visionBtn');
            const line = document.getElementById('scanLine');
            const log = document.getElementById('analysisLog');
            const t = trans[window.lang];
            
            btn.disabled = true; line.style.display = 'block'; log.style.display = 'block'; log.innerHTML = "";
            tg.HapticFeedback.impactOccurred('medium');

            const logSteps = [t.log1, t.log2, t.log3, t.log4, t.log5];
            for (let i = 0; i < logSteps.length; i++) {
                log.innerHTML += logSteps[i] + "<br>";
                line.style.top = (i * 20) + "%";
                tg.HapticFeedback.selectionChanged();
                await new Promise(r => setTimeout(r, 600));
            }

            const w = canvas.width, h = canvas.height;
            const histData = ctx.getImageData(0, 0, Math.floor(w*0.7), h).data;
            const nowData = ctx.getImageData(Math.floor(w*0.7), 0, Math.floor(w*0.3), h).data;

            function count(data) {
                let g=0, r=0;
                for(let i=0; i<data.length; i+=16) {
                    if(data[i+1] > data[i]+15 && data[i+1] > data[i+2]+15) g++;
                    if(data[i] > data[i+1]+15 && data[i] > data[i+2]+15) r++;
                }
                return {g, r};
            }

            const hP = count(histData), nP = count(nowData);
            const totalH = hP.g + hP.r || 1, totalN = nP.g + nP.r || 1;
            const densH = totalH / (w * 0.7 * h), densN = totalN / (w * 0.3 * h);
            const isExhausted = densN > (densH * 2.2);

            document.getElementById('screen-upload').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');
            document.getElementById('step-result').classList.add('active');

            let isUp = nP.g > nP.r;
            if (isExhausted) isUp = nP.r > nP.g; 

            const resS = document.getElementById('resSignal');
            resS.innerText = isUp ? t.up : t.down;
            resS.style.color = isUp ? "var(--accent)" : "var(--danger)";
            document.getElementById('resBorder').style.borderColor = resS.style.color;
            document.getElementById('trend-status').innerText = isExhausted ? t.reversal : t.follow;
            document.getElementById('impulse-zone').innerText = isExhausted ? t.overheated : t.normal;
            document.getElementById('rec-time').innerText = isExhausted ? "1-2 MIN" : "5-10 MIN";
            document.getElementById('resAccuracy').innerText = "Confidence: " + (65 + Math.random()*25).toFixed(1) + "%";

            tg.HapticFeedback.notificationOccurred('success');
        };

        window.updateUI();
    </script>
</body>
</html>
