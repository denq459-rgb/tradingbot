<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kryon Algo Trade Bot - Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0c0f17;
            --card-bg: #161a24;
            --accent: #00f281;
            --text-main: #ffffff;
            --text-gray: #7a828a;
            --border: #232a35;
            --danger: #ff4b5c;
            --warning: #ff9d00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- HEADER --- */
        .app-header { padding: 20px 15px; text-align: center; background: linear-gradient(to bottom, #11151e, var(--bg-color)); border-bottom: 1px solid var(--border); }
        .app-title { font-size: 20px; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .app-subtitle { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        /* --- CONTENT --- */
        .content { flex: 1; padding: 15px; padding-bottom: 100px; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UPLOAD & ANIMATION */
        .upload-area {
            border: 2px dashed var(--border); border-radius: 24px;
            padding: 50px 15px; text-align: center;
            background: rgba(255,255,255,0.02); position: relative;
            overflow: hidden; cursor: pointer;
        }
        #main-canvas { width: 100%; border-radius: 12px; display: none; margin-top: 10px; }
        
        .scan-line { position: absolute; left: 0; width: 100%; height: 3px; background: var(--accent); box-shadow: 0 0 20px var(--accent); display: none; z-index: 10; }
        .analysis-log { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 9px; color: var(--accent); text-align: left; z-index: 11; display: none; }

        /* RESULT */
        .result-card { background: var(--card-bg); border-radius: 24px; padding: 30px 20px; text-align: center; border: 2px solid var(--border); }
        .signal-val { font-size: 48px; font-weight: 900; margin: 15px 0; letter-spacing: 1px; }
        
        .analysis-box {
            background: #11151e; border-radius: 12px; padding: 15px;
            margin-top: 20px; text-align: left; border-left: 3px solid var(--accent);
        }
        .analysis-item { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; color: var(--text-gray); }
        .analysis-item b { color: #fff; }

        /* BUTTONS */
        .btn-main {
            width: 100%; padding: 20px; background: var(--accent); color: #000;
            border: none; border-radius: 16px; font-weight: 800; font-size: 16px;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 20px rgba(0, 242, 129, 0.3);
            margin-top: 20px;
        }
        .btn-main:disabled { background: #232a35; color: #555; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #11151e; display: flex; justify-content: space-around; padding: 15px 0 35px 0; border-top: 1px solid var(--border); }
        .nav-item { color: var(--accent); display: flex; flex-direction: column; align-items: center; font-size: 10px; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1 class="app-title">Kryon Algo Pro</h1>
        <p class="app-subtitle">Multi-Zone AI Vision</p>
    </div>

    <div class="content">
        <div id="screen-upload" class="screen active">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div id="placeholder">
                    <div style="font-size: 45px; margin-bottom: 15px;">📊</div>
                    <div style="font-weight: 800; font-size: 18px;">UPLOAD CHART</div>
                    <div style="font-size: 10px; color: var(--text-gray); margin-top: 8px;">AI detects fakeouts and exhaustion</div>
                </div>
                <div class="analysis-log" id="analysisLog"></div>
                <div class="scan-line" id="scanLine"></div>
                <canvas id="main-canvas"></canvas>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="window.handleImage(this)">
            <button id="visionBtn" class="btn-main" style="display:none;" onclick="window.performUltraAnalysis()">Start Smart Scan</button>
            <button style="margin: 25px auto 0; display: block; background:none; border:none; color:#fff; font-size:12px; opacity:0.5;" onclick="location.reload()">Reset App</button>
        </div>

        <div id="screen-result" class="screen">
            <div class="result-card" id="resBorder">
                <div style="color: var(--text-gray); font-size: 10px; letter-spacing: 1px;">KRYON AI ULTRA PREDICTION</div>
                <div id="resSignal" class="signal-val">---</div>
                <div id="resAccuracy" style="font-size: 18px; font-weight: bold; color: var(--accent);">Confidence: --%</div>
                
                <div class="analysis-box">
                    <div class="analysis-item"><span>Market Phase:</span> <b id="trend-status">---</b></div>
                    <div class="analysis-item"><span>Impulse Zone:</span> <b id="impulse-zone">---</b></div>
                    <div class="analysis-item"><span>Rec. Time:</span> <b id="rec-time">---</b></div>
                </div>
            </div>
            <button class="btn-main" style="background: #232a35; color: #fff;" onclick="location.reload()">New Analysis</button>
        </div>
    </div>

    <div class="nav-bar"><div class="nav-item">⚡<br>Signals</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let canvas = document.getElementById('main-canvas');
        let ctx = canvas.getContext('2d', { willReadFrequently: true });

        window.handleImage = function(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    canvas.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('visionBtn').style.display = 'block';
                    tg.HapticFeedback.impactOccurred('medium');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.performUltraAnalysis = async function() {
            const btn = document.getElementById('visionBtn');
            const line = document.getElementById('scanLine');
            const log = document.getElementById('analysisLog');
            
            btn.disabled = true;
            line.style.display = 'block';
            log.style.display = 'block';
            log.innerHTML = "";
            
            tg.HapticFeedback.impactOccurred('medium');

            const logSteps = ["> Считывание пикселей...", "> Анализ зон...", "> Поиск уровней...", "> Проверка импульса...", "> Итоговый расчет..."];
            for (let i = 0; i < logSteps.length; i++) {
                log.innerHTML += logSteps[i] + "<br>";
                line.style.top = (i * 20) + "%";
                tg.HapticFeedback.selectionChanged();
                await new Promise(r => setTimeout(r, 600));
            }

            const w = canvas.width, h = canvas.height;
            // Зона 1: История (до 70% ширины)
            const histData = ctx.getImageData(0, 0, Math.floor(w*0.7), h).data;
            // Зона 2: Сигнал (последние 30%)
            const currentData = ctx.getImageData(Math.floor(w*0.7), 0, Math.floor(w*0.3), h).data;

            function count(data) {
                let g=0, r=0;
                for(let i=0; i<data.length; i+=16) {
                    if(data[i+1] > data[i]+15 && data[i+1] > data[i+2]+15) g++;
                    if(data[i] > data[i+1]+15 && data[i] > data[i+2]+15) r++;
                }
                return {g, r};
            }

            const hP = count(histData);
            const nP = count(currentData);

            // ЛОГИКА УМНОГО АНАЛИЗА
            const totalH = hP.g + hP.r || 1;
            const totalN = nP.g + nP.r || 1;
            
            // Относительная активность (плотность цвета)
            const densH = totalH / (w * 0.7 * h);
            const densN = totalN / (w * 0.3 * h);

            // Если плотность в сигнальной зоне в 2 раза выше чем в истории - это ПЕРЕГРЕВ
            const isExhausted = densN > (densH * 2.2);

            document.getElementById('screen-upload').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');

            let isUp = nP.g > nP.r;
            let status = "Trend Following";
            let recTime = "5 - 10 MIN";
            let impulse = "Stable";

            if (isExhausted) {
                // Если был резкий рост (как в вашем случае) - меняем на PUT
                isUp = nP.r > nP.g; 
                status = "REVERSAL (Overheated)";
                impulse = "BURST DETECTED";
                recTime = "1 - 2 MIN";
            }

            const resS = document.getElementById('resSignal');
            resS.innerText = isUp ? "CALL 🟢" : "PUT 🔴";
            resS.style.color = isUp ? "var(--accent)" : "var(--danger)";
            document.getElementById('resBorder').style.borderColor = isUp ? "var(--accent)" : "var(--danger)";
            
            document.getElementById('trend-status').innerText = status;
            document.getElementById('trend-status').style.color = isExhausted ? "var(--warning)" : "var(--accent)";
            document.getElementById('impulse-zone').innerText = impulse;
            document.getElementById('rec-time').innerText = recTime;
            document.getElementById('resAccuracy').innerText = "Confidence: " + (65 + Math.random()*25).toFixed(1) + "%";

            tg.HapticFeedback.notificationOccurred('success');
        };
    </script>
</body>
</html>
