<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trade Algo Bot - Pro Vision</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #1a1e26;
            --accent: #00f281;
            --text-main: #ffffff;
            --text-gray: #8e949a;
            --border: #2c313a;
            --danger: #ff4b5c;
            --warning: #ffbd2e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        .header { 
            position: sticky; top: 0; z-index: 1000;
            padding: 15px; background: var(--card-bg); 
            border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-btn { color: var(--accent); cursor: pointer; font-size: 22px; display: none; padding-right: 10px; }
        .header-title { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; }

        .content { flex: 1; padding: 15px; padding-bottom: 100px; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* СПИСОК ПАР И РЕЖИМОВ */
        .pair-row, .method-card { background: var(--card-bg); padding: 18px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; }
        .method-icon { font-size: 24px; margin-right: 15px; width: 40px; height: 40px; background: #232933; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: var(--accent); }

        /* VISION SCANNER */
        .upload-area { border: 2px dashed var(--border); border-radius: 20px; padding: 30px 15px; text-align: center; background: rgba(255,255,255,0.02); position: relative; overflow: hidden; }
        #main-canvas { width: 100%; border-radius: 12px; display: none; margin-top: 10px; }
        .scan-line { position: absolute; left: 0; width: 100%; height: 3px; background: var(--accent); box-shadow: 0 0 15px var(--accent); display: none; z-index: 5; }

        /* ЭКРАН РЕЗУЛЬТАТА */
        .result-card { background: var(--card-bg); border-radius: 24px; padding: 25px; text-align: center; border: 2px solid var(--border); margin-top: 10px; }
        .signal-val { font-size: 42px; font-weight: 900; margin: 10px 0; letter-spacing: 1px; }
        
        /* БЛОКИ АНАЛИЗА */
        .analysis-box { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; margin-top: 15px; text-align: left; border-left: 3px solid var(--accent); }
        .analysis-item { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; color: var(--text-gray); }
        .analysis-item b { color: #fff; }

        .btn-main { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; border-radius: 16px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .btn-main:disabled { background: #2c313a; color: #555; }

        .pulse { animation: pulseAnim 1.5s infinite; }
        @keyframes pulseAnim { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center;">
            <div id="back-icon" class="back-btn" onclick="window.goBack()">❮</div>
            <span id="main-title" class="header-title">Trade Algo AI</span>
        </div>
        <button id="lang-btn" style="background:none; border:1px solid #333; color:#fff; font-size:10px; padding:4px 8px; border-radius:4px;" onclick="window.toggleLang()">RU / EN</button>
    </div>

    <div class="content">
        <!-- ГЛАВНЫЙ ЭКРАН -->
        <div id="screen-modes" class="screen active">
            <div class="method-card" onclick="window.switchScreen('screenshot')">
                <div class="method-icon">📸</div>
                <div class="method-info">
                    <div style="font-weight:bold;">AI Vision v2.0</div>
                    <div style="font-size:11px; color:var(--text-gray);">Анализ истории и перегрева тренда</div>
                </div>
            </div>
            <div class="method-card" onclick="alert('Manual signals coming soon')">
                <div class="method-icon">⚡</div>
                <div class="method-info">
                    <div style="font-weight:bold;">Algo Signal</div>
                    <div style="font-size:11px; color:var(--text-gray);">Быстрый сигнал по индикаторам</div>
                </div>
            </div>
        </div>

        <!-- ЭКРАН СКРИНШОТА -->
        <div id="screen-screenshot" class="screen">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div id="placeholder">
                    <div style="font-size: 40px; margin-bottom: 10px;">📁</div>
                    <div style="font-weight: 800;">ЗАГРУЗИТЬ ГРАФИК</div>
                    <div style="font-size: 10px; color: var(--text-gray); margin-top: 5px;">Система считает историю слева</div>
                </div>
                <div class="scan-line" id="scanLine"></div>
                <canvas id="main-canvas"></canvas>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="window.handleImage(this)">
            <button id="visionBtn" class="btn-main" style="display:none" onclick="window.performDeepAnalysis()">АНАЛИЗИРОВАТЬ</button>
        </div>

        <!-- ЭКРАН РЕЗУЛЬТАТА -->
        <div id="screen-result" class="screen">
            <div class="result-card" id="resBorder">
                <div style="font-size: 11px; color: var(--text-gray); letter-spacing: 1px;">DEEP VISION ANALYSIS</div>
                <div id="resSignal" class="signal-val">---</div>
                <div id="resAccuracy" style="font-size: 18px; font-weight: bold; color: var(--accent);">Confidence: --%</div>
                
                <div class="analysis-box">
                    <div class="analysis-item"><span>Состояние тренда:</span> <b id="trend-status">Normal</b></div>
                    <div class="analysis-item"><span>Сила импульса:</span> <b id="impulse-power">Low</b></div>
                    <div class="analysis-item"><span>Реком. время:</span> <b id="rec-time">--:--</b></div>
                </div>
            </div>
            <button class="btn-main" onclick="window.switchScreen('modes')" style="background:#232933; color:#fff;">НОВЫЙ АНАЛИЗ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let canvas = document.getElementById('main-canvas');
        let ctx = canvas.getContext('2d', { willReadFrequently: true });

        window.switchScreen = function(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            document.getElementById('back-icon').style.display = id === 'modes' ? 'none' : 'block';
        };

        window.goBack = function() { window.switchScreen('modes'); };

        window.handleImage = function(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    canvas.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('visionBtn').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        // ГЛУБОКИЙ АНАЛИЗ (ИСТОРИЯ + ПЕРЕГРЕВ)
        window.performDeepAnalysis = async function() {
            const btn = document.getElementById('visionBtn');
            const line = document.getElementById('scanLine');
            btn.disabled = true; line.style.display = 'block';
            
            tg.HapticFeedback.impactOccurred('medium');

            // Анимация сканера
            let pos = 0;
            let interval = setInterval(() => { pos += 5; line.style.top = pos + "%"; if(pos >= 100) pos = 0; }, 50);

            await new Promise(r => setTimeout(r, 3000));

            // СЧИТЫВАНИЕ ПИКСЕЛЕЙ
            const w = canvas.width, h = canvas.height;
            
            // Зона 1: История (левая часть)
            const historyData = ctx.getImageData(0, 0, Math.floor(w*0.7), h).data;
            // Зона 2: Текущий момент (правая часть)
            const currentData = ctx.getImageData(Math.floor(w*0.7), 0, Math.floor(w*0.3), h).data;

            function countPixels(data) {
                let g = 0, r = 0;
                for(let i=0; i<data.length; i+=16) {
                    if(data[i+1] > data[i]+15 && data[i+1] > data[i+2]+15) g++;
                    if(data[i] > data[i+1]+15 && data[i] > data[i+2]+15) r++;
                }
                return { g, r };
            }

            const hist = countPixels(historyData);
            const now = countPixels(currentData);

            clearInterval(interval);
            line.style.display = 'none';
            btn.disabled = false;

            // ЛОГИКА ПЕРЕГРЕВА
            // Если текущая активность (красного или зеленого) в 2.5 раза выше средней в истории - это перегрев
            const avgHist = (hist.g + hist.r) / 2;
            const nowMax = Math.max(now.g, now.r);
            const isExhausted = nowMax > (avgHist * 0.8); // Упрощенный коэффициент плотности

            let signal = "";
            let status = "Trend Following";
            let impulse = "Medium";
            let recTime = "3-5 MIN";

            if (isExhausted) {
                // Если был резкий слив (много красного), ставим на ОТСКОК (ВВЕРХ)
                if (now.r > now.g) {
                    signal = "CALL 🟢";
                    status = "EXHAUSTED (Reversal)";
                    impulse = "OVERHEATED";
                    recTime = "1-2 MIN";
                } else {
                    signal = "PUT 🔴";
                    status = "EXHAUSTED (Reversal)";
                    impulse = "OVERHEATED";
                    recTime = "1-2 MIN";
                }
            } else {
                // Обычное следование за трендом
                if (now.g > now.r) {
                    signal = "CALL 🟢";
                    recTime = "5-10 MIN";
                } else {
                    signal = "PUT 🔴";
                    recTime = "5-10 MIN";
                }
            }

            // Вывод результата
            document.getElementById('resSignal').innerText = signal;
            document.getElementById('resSignal').style.color = signal.includes("CALL") ? "var(--accent)" : "var(--danger)";
            document.getElementById('trend-status').innerText = status;
            document.getElementById('trend-status').style.color = isExhausted ? "var(--warning)" : "var(--accent)";
            document.getElementById('impulse-power').innerText = impulse;
            document.getElementById('rec-time').innerText = recTime;
            document.getElementById('resAccuracy').innerText = "Confidence: " + (72 + Math.random()*20).toFixed(1) + "%";

            window.switchScreen('result');
            tg.HapticFeedback.notificationOccurred('success');
        };
    </script>
</body>
</html>
