<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced AI Algo Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0e11;
            --card-bg: #1e2329;
            --primary: #f0b90b;
            --success: #02c076;
            --danger: #cf304a;
            --text: #ffffff;
            --gray: #848e9c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Навигация по экранам */
        .screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        /* --- ЭКРАН ВЫБОРА ПАР --- */
        .header-selection {
            padding: 20px;
            text-align: center;
        }

        .title-selection {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .subtitle-selection {
            font-size: 12px;
            color: var(--gray);
        }

        .pairs-list {
            width: 90%;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 10px;
            overflow-y: auto;
        }

        .pair-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #2b3139;
            cursor: pointer;
            transition: background 0.2s;
        }

        .pair-row:last-child { border-bottom: none; }
        .pair-row:active { background: #2b3139; }

        .pair-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .pair-arrow { color: var(--gray); font-size: 12px; }

        .pair-tags {
            display: flex;
            gap: 5px;
        }

        .tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .tag.hot { background: rgba(240, 185, 11, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .tag.otc { background: rgba(255, 100, 0, 0.1); color: #ff6400; border: 1px solid #ff6400; }

        /* --- ЭКРАН АНАЛИЗА --- */
        .header-analysis {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
        }

        .back-btn {
            color: var(--primary);
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }

        .chart-container {
            width: 95%;
            height: 250px;
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .signal-box {
            position: relative;
            width: 150px;
            height: 170px;
            background: var(--card-bg);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary);
            margin: 20px 0;
        }

        .btn-main {
            width: 90%;
            padding: 18px;
            background: linear-gradient(45deg, #f0b90b, #f3ba2f);
            border: none;
            border-radius: 16px;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--primary);
            top: 0;
            display: none;
            animation: scan 2s linear infinite;
        }

        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .analyzing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ВЫБОР ПАР -->
    <div id="screen-selection" class="screen active">
        <div class="header-selection">
            <div class="title-selection">Most Popular Pairs</div>
            <div class="subtitle-selection">Choose your trading pair</div>
        </div>

        <div class="pairs-list">
            <div class="pair-row" onclick="selectPair('EURUSD', '🇪🇺 EUR ➔ 🇺🇸 USD')">
                <div class="pair-info"><span>🇪🇺 EUR</span> <span class="pair-arrow">➔</span> <span>🇺🇸 USD</span></div>
                <div class="pair-tags"><span class="tag hot">Hot</span><span class="tag otc">OTC</span></div>
            </div>
            <div class="pair-row" onclick="selectPair('GBPUSD', '🇬🇧 GBP ➔ 🇺🇸 USD')">
                <div class="pair-info"><span>🇬🇧 GBP</span> <span class="pair-arrow">➔</span> <span>🇺🇸 USD</span></div>
                <div class="pair-tags"><span class="tag hot">Hot</span></div>
            </div>
            <div class="pair-row" onclick="selectPair('USDJPY', '🇺🇸 USD ➔ 🇯🇵 JPY')">
                <div class="pair-info"><span>🇺🇸 USD</span> <span class="pair-arrow">➔</span> <span>🇯🇵 JPY</span></div>
                <div class="pair-tags"><span class="tag otc">OTC</span></div>
            </div>
            <div class="pair-row" onclick="selectPair('EURGBP', '🇪🇺 EUR ➔ 🇬🇧 GBP')">
                <div class="pair-info"><span>🇪🇺 EUR</span> <span class="pair-arrow">➔</span> <span>🇬🇧 GBP</span></div>
                <div class="pair-tags"><span class="tag hot">Hot</span><span class="tag otc">OTC</span></div>
            </div>
            <div class="pair-row" onclick="selectPair('AUDUSD', '🇦🇺 AUD ➔ 🇺🇸 USD')">
                <div class="pair-info"><span>🇦🇺 AUD</span> <span class="pair-arrow">➔</span> <span>🇺🇸 USD</span></div>
                <div class="pair-tags"><span class="tag otc">OTC</span></div>
            </div>
        </div>
        <p style="color: var(--gray); font-size: 12px; margin-top: 15px;">Powered by Advanced AI</p>
    </div>

    <!-- ЭКРАН 2: АНАЛИЗ -->
    <div id="screen-analysis" class="screen">
        <div class="header-analysis">
            <button class="back-btn" onclick="showSelection()">❮ К выбору пар</button>
            <div id="active-pair-name" style="font-size: 14px; font-weight: bold;">EUR/USD</div>
            <div style="width: 50px;"></div> <!-- Отступ -->
        </div>

        <div class="chart-container">
            <div id="tradingview_widget"></div>
        </div>

        <div style="display: flex; gap: 30px; margin-top: 15px;">
            <div style="text-align: center;"><div style="font-size: 10px; color: var(--gray);">Accuracy</div><div id="acc-val" style="color: var(--success); font-weight: bold;">94.2%</div></div>
            <div style="text-align: center;"><div style="font-size: 10px; color: var(--gray);">Strategy</div><div style="color: white; font-weight: bold;">Scalp AI</div></div>
        </div>

        <div class="signal-box" id="signalBox">
            <div class="scanner-line" id="scanner"></div>
            <div id="signal-icon" style="font-size: 40px;">📡</div>
            <div id="signal-value" style="font-weight: 900;">READY</div>
        </div>

        <button class="btn-main" id="analyzeBtn" onclick="runAI()">GET AI SIGNAL</button>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let currentSymbol = "EURUSD";

        function selectPair(symbol, fullName) {
            currentSymbol = symbol;
            document.getElementById('active-pair-name').innerText = fullName;
            document.getElementById('screen-selection').classList.remove('active');
            document.getElementById('screen-analysis').classList.add('active');
            
            tg.HapticFeedback.impactOccurred('medium');

            // Обновляем график под выбранную пару
            new TradingView.widget({
                "autosize": true,
                "symbol": "FX:" + symbol,
                "interval": "1",
                "theme": "dark",
                "style": "1",
                "locale": "ru",
                "hide_top_toolbar": true,
                "container_id": "tradingview_widget"
            });
        }

        function showSelection() {
            document.getElementById('screen-analysis').classList.remove('active');
            document.getElementById('screen-selection').classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function runAI() {
            const btn = document.getElementById('analyzeBtn');
            const box = document.getElementById('signalBox');
            const scanner = document.getElementById('scanner');
            const icon = document.getElementById('signal-icon');
            const value = document.getElementById('signal-value');

            btn.disabled = true;
            box.classList.add('analyzing');
            scanner.style.display = 'block';
            icon.innerText = '🧠';
            value.innerText = 'WAIT...';
            
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                const isUp = Math.random() > 0.5;
                box.classList.remove('analyzing');
                scanner.style.display = 'none';
                btn.disabled = false;

                if (isUp) {
                    icon.innerText = '🔼';
                    value.innerText = 'UP (CALL)';
                    value.style.color = 'var(--success)';
                    box.style.borderColor = 'var(--success)';
                } else {
                    icon.innerText = '🔽';
                    value.innerText = 'DOWN (PUT)';
                    value.style.color = 'var(--danger)';
                    box.style.borderColor = 'var(--danger)';
                }
                tg.HapticFeedback.notificationOccurred('success');
            }, 2000);
        }
    </script>
</body>
</html>
