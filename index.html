<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypton AI Real Vision</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #0d0d12;
            --accent: #00f3ff;
            --success: #39ff14;
            --danger: #ff003c;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        .app-header { padding: 20px; text-align: center; border-bottom: 2px solid #1a1a25; }
        .app-title { font-size: 16px; font-weight: 800; letter-spacing: 2px; color: var(--accent); }

        .content { flex: 1; padding: 15px; padding-bottom: 100px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* ЗОНА ЗАГРУЗКИ */
        .upload-box {
            width: 100%; min-height: 300px;
            background: var(--card); border: 2px dashed #333;
            border-radius: 20px; position: relative;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: pointer;
        }
        #main-canvas { max-width: 100%; max-height: 400px; display: none; }

        /* СКАНЕР */
        .scan-bar {
            position: absolute; left: 0; width: 100%; height: 3px;
            background: var(--accent); box-shadow: 0 0 20px var(--accent);
            display: none; z-index: 10;
        }

        /* ЛОГ */
        .terminal-log {
            background: #000; border: 1px solid #1a1a25;
            border-radius: 10px; padding: 10px; margin-top: 15px;
            font-family: 'Courier New', monospace; font-size: 10px;
            color: #00ff00; height: 80px; overflow-y: auto;
        }

        /* КАРТОЧКА РЕЗУЛЬТАТА */
        .res-card {
            background: var(--card); border-radius: 25px; padding: 30px;
            margin-top: 20px; border: 1px solid #333; text-align: center;
        }
        .signal-val { font-size: 56px; font-weight: 900; margin: 15px 0; }

        /* КНОПКИ */
        .btn {
            width: 100%; padding: 20px; background: var(--accent);
            color: #000; border: none; border-radius: 12px;
            font-weight: 900; font-size: 16px; cursor: pointer;
            margin-top: 20px; text-transform: uppercase;
        }
        .btn:disabled { background: #222; color: #555; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title">REAL AI VISION ANALYZER</div>
    </div>

    <div class="content">
        <!-- ЭКРАН 1: ЗАГРУЗКА И АНАЛИЗ -->
        <div id="screen-analysis" class="screen active">
            <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div id="placeholder">
                    <p>📸 Загрузите скриншот графика</p>
                    <p style="font-size: 10px; color: #555;">(TradingView, MT4/5, PocketOption)</p>
                </div>
                <div class="scan-bar" id="scanLine"></div>
                <canvas id="main-canvas"></canvas>
            </div>

            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(this)">

            <div class="terminal-log" id="log">
                > System ready...<br>
                > Ожидание графических данных...
            </div>

            <button id="analyzeBtn" class="btn" style="display:none" onclick="performRealAnalysis()">Провести реальный анализ</button>
        </div>

        <!-- ЭКРАН 2: РЕЗУЛЬТАТ -->
        <div id="screen-result" class="screen">
            <div class="res-card" id="resBorder">
                <div style="color: #888; font-size: 12px; letter-spacing: 2px;">РЕЗУЛЬТАТ СКАНИРОВАНИЯ</div>
                <div id="resSignal" class="signal-val">---</div>
                <div id="resPower" style="font-size: 18px; font-weight: bold; color: var(--accent);">Точность: --%</div>
                
                <div style="display: flex; justify-content: space-around; margin-top: 25px; font-size: 10px; color: #666;">
                    <div>BULLISH PX: <span id="pxGreen" style="color:var(--success)">0</span></div>
                    <div>BEARISH PX: <span id="pxRed" style="color:var(--danger)">0</span></div>
                </div>
            </div>
            <button class="btn" onclick="location.reload()">Новый анализ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let canvas = document.getElementById('main-canvas');
        let ctx = canvas.getContext('2d', { willReadFrequently: true });
        let log = document.getElementById('log');

        function writeLog(text) {
            log.innerHTML += `<br>> ${text}`;
            log.scrollTop = log.scrollHeight;
        }

        // 1. ЗАГРУЗКА ИЗОБРАЖЕНИЯ
        function handleImage(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    canvas.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('analyzeBtn').style.display = 'block';
                    
                    writeLog("Файл загружен: " + img.width + "x" + img.height);
                    writeLog("Интерфейс распознан. Готов к расчету.");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 2. РЕАЛЬНЫЙ ПИКСЕЛЬНЫЙ АНАЛИЗ
        async function performRealAnalysis() {
            const btn = document.getElementById('analyzeBtn');
            const scanLine = document.getElementById('scanLine');
            
            btn.disabled = true;
            scanLine.style.display = 'block';
            
            writeLog("Запуск нейронного сканирования пикселей...");
            tg.HapticFeedback.impactOccurred('medium');

            // Анимация линии сканера
            let pos = 0;
            let interval = setInterval(() => {
                pos += 5;
                scanLine.style.top = pos + "%";
                if(pos >= 100) pos = 0;
            }, 50);

            // Имитируем время на "обработку" (хотя JS считает мгновенно)
            await new Promise(r => setTimeout(r, 3000));

            // ПОЛУЧАЕМ ДАННЫЕ ПИКСЕЛЕЙ
            // Анализируем только правую часть (последние движения цены)
            const width = canvas.width;
            const height = canvas.height;
            const startX = Math.floor(width * 0.75); // Берем последние 25% ширины
            const imageData = ctx.getImageData(startX, 0, width - startX, height);
            const data = imageData.data;

            let greenPixels = 0;
            let redPixels = 0;

            // Цикл по пикселям (шаг 4 для скорости)
            for (let i = 0; i < data.length; i += 16) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // Логика определения цвета свечи (упрощенно)
                // Зеленый (Bullish): G > R и G > B
                if (g > r + 20 && g > b + 20) greenPixels++;
                // Красный (Bearish): R > G и R > B
                if (r > g + 20 && r > b + 20) redPixels++;
            }

            clearInterval(interval);
            showResult(greenPixels, redPixels);
        }

        // 3. ОБРАБОТКА РЕЗУЛЬТАТА
        function showResult(green, red) {
            document.getElementById('screen-analysis').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');

            const resSignal = document.getElementById('resSignal');
            const resBorder = document.getElementById('resBorder');
            const resPower = document.getElementById('resPower');
            
            document.getElementById('pxGreen').innerText = green;
            document.getElementById('pxRed').innerText = red;

            // Расчет точности на основе перевеса пикселей
            const total = green + red;
            let ratio = 0;
            
            if (total === 0) {
                resSignal.innerText = "WAIT";
                resPower.innerText = "Данных недостаточно";
                return;
            }

            if (green > red) {
                ratio = (green / total * 100).toFixed(1);
                resSignal.innerText = "CALL 🟢";
                resSignal.style.color = "var(--success)";
                resBorder.style.borderColor = "var(--success)";
            } else {
                ratio = (red / total * 100).toFixed(1);
                resSignal.innerText = "PUT 🔴";
                resSignal.style.color = "var(--danger)";
                resBorder.style.borderColor = "var(--danger)";
            }

            // Масштабируем коэффициент для реалистичности (от 65% до 94%)
            let finalPower = 65 + (ratio / 100 * 29);
            resPower.innerText = "Вероятность: " + finalPower.toFixed(1) + "%";
            
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
