<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kryon AI Vision - Ultra v4</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0c0f17; --card-bg: #161a24; --accent: #00f281;
            --text-main: #ffffff; --text-gray: #7a828a; --border: #232a35;
            --danger: #ff4b5c; --warning: #ff9d00;
        }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        .app-header {
            padding: 20px; text-align: center; border-bottom: 1px solid var(--border);
            background: linear-gradient(to bottom, #11151e, var(--bg-color));
        }
        .steps-bar {
            display: inline-flex; gap: 15px; background: #11151e; padding: 8px 15px;
            border-radius: 20px; font-size: 10px; color: var(--text-gray); margin-top: 15px;
        }
        .steps-bar span.active { color: var(--accent); font-weight: bold; }
        .content { flex: 1; padding: 15px; padding-bottom: 100px; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .upload-area {
            border: 2px dashed var(--border); border-radius: 20px; padding: 40px 10px;
            text-align: center; background: rgba(255,255,255,0.01); position: relative; cursor: pointer;
        }
        #main-canvas { width: 100%; border-radius: 10px; display: none; margin-top: 10px; border: 1px solid var(--border); }
        .scan-line { position: absolute; left: 0; width: 100%; height: 2px; background: var(--accent); display: none; z-index: 10; box-shadow: 0 0 15px var(--accent); }
        .analysis-log { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 9px; color: var(--accent); display: none; text-align: left; }

        .result-card { 
            background: var(--card-bg); border-radius: 24px; padding: 25px 15px; 
            text-align: center; border: 2px solid var(--border); margin-bottom: 15px;
        }
        .signal-val { font-size: 48px; font-weight: 900; margin: 10px 0; }
        .analysis-box { background: #11151e; border-radius: 12px; padding: 15px; margin-top: 15px; text-align: left; }
        .analysis-item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; color: var(--text-gray); }
        .analysis-item b { color: #fff; }

        .btn-main {
            width: 100%; padding: 20px; background: var(--accent); color: #000;
            border: none; border-radius: 15px; font-weight: 800; font-size: 15px;
            cursor: pointer; text-transform: uppercase; margin-bottom: 15px;
        }
        .lang-btn {
            background: transparent; color: var(--text-gray); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 8px; font-size: 10px; cursor: pointer; display: block; margin: 0 auto;
        }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #11151e; padding: 15px 0 30px; text-align: center; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="app-header">
        <h1 style="font-size: 20px; margin: 0;">Kryon AI Vision <span style="color: var(--accent);">v4</span></h1>
        <div class="steps-bar">
            <span id="step-upload" class="active">SCANNING</span>
            <span id="step-result">RESULT</span>
        </div>
    </div>

    <div class="content">
        <div id="screen-upload" class="screen active">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div id="placeholder">
                    <div style="font-size: 40px; margin-bottom: 10px;">📸</div>
                    <b id="t-up-t">ЗАГРУЗИТЕ СКРИНШОТ</b>
                    <p style="font-size: 11px; color: var(--text-gray);" id="t-up-d">ИИ проанализирует импульс последних свечей</p>
                </div>
                <div class="analysis-log" id="analysisLog"></div>
                <div class="scan-line" id="scanLine"></div>
                <canvas id="main-canvas"></canvas>
            </div>
            
            <div style="text-align: center; margin-top: 15px;">
                <select id="colorTheme" style="background: #11151e; color: #fff; border: 1px solid var(--border); padding: 5px; border-radius: 5px; font-size: 12px;">
                    <option value="green_red">Green / Red Theme</option>
                    <option value="blue_red">Blue / Red Theme</option>
                </select>
            </div>

            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="window.handleImage(this)">
            <button id="visionBtn" class="btn-main" style="display:none; margin-top: 20px;" onclick="window.performAnalysis()">АНАЛИЗ ИМПУЛЬСА</button>
            <button class="lang-btn" onclick="window.toggleLang()">RU / EN</button>
        </div>

        <div id="screen-result" class="screen">
            <div class="result-card" id="resBorder">
                <div style="color: var(--text-gray); font-size: 10px; letter-spacing: 1px;">KRYON AI NEURAL SCORE</div>
                <div id="resSignal" class="signal-val">---</div>
                <div id="resAccuracy" style="font-size: 18px; font-weight: bold; color: var(--accent);">Confidence: --%</div>
                
                <div class="analysis-box">
                    <div class="analysis-item"><span>Логика:</span> <b id="trend-status">---</b></div>
                    <div class="analysis-item"><span>Импульс:</span> <b id="impulse-power">---</b></div>
                    <div class="analysis-item"><span>Экспирация:</span> <b id="rec-time">---</b></div>
                </div>
            </div>
            <button class="btn-main" style="background: #232a35; color: #fff;" onclick="location.reload()">НОВЫЙ АНАЛИЗ</button>
        </div>
    </div>

    <div class="nav-bar"><div style="font-size: 10px; color: var(--accent); font-weight: bold;">● AI MOMENTUM DETECTOR ACTIVE</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        window.lang = 'ru';
        let canvas = document.getElementById('main-canvas');
        let ctx = canvas.getContext('2d', { willReadFrequently: true });

        const trans = {
            ru: { up: "ВВЕРХ 🟢", down: "ВНИЗ 🔴", trend: "По тренду", rev: "РАЗВОРОТ ИМПУЛЬСА ⚠️", stable: "Стабильный", high: "Высокий", log: ["> Поиск зон...", "> Замер импульса...", "> Анализ фитилей...", "> Финальный Score..."] },
            en: { up: "CALL 🟢", down: "PUT 🔴", trend: "Trend Follow", rev: "MOMENTUM REVERSAL ⚠️", stable: "Stable", high: "High", log: ["> Zone search...", "> Pulse check...", "> Wick analysis...", "> Final Score..."] }
        };

        window.toggleLang = function() {
            window.lang = window.lang === 'ru' ? 'en' : 'ru';
            alert("Language: " + window.lang.toUpperCase());
        };

        window.handleImage = function(input) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const scale = 1000 / img.width;
                    canvas.width = 1000; canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('visionBtn').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        };

        window.performAnalysis = async function() {
            const btn = document.getElementById('visionBtn');
            const log = document.getElementById('analysisLog');
            const line = document.getElementById('scanLine');
            const theme = document.getElementById('colorTheme').value;
            const t = trans[window.lang];

            btn.disabled = true; line.style.display = 'block'; log.style.display = 'block';
            for(let i=0; i<4; i++) {
                log.innerHTML += t.log[i] + "<br>";
                line.style.top = (20 * (i+1)) + "%";
                await new Promise(r => setTimeout(r, 600));
            }

            const w = canvas.width, h = canvas.height;

            // 1. Глобальный тренд (60% графика)
            const globalData = ctx.getImageData(0, 0, w * 0.6, h).data;
            let gUp = 0, gDown = 0;
            for(let i=0; i<globalData.length; i+=64) {
                if(theme === 'green_red') { if(globalData[i+1] > globalData[i]+20) gUp++; else if(globalData[i] > globalData[i+1]+20) gDown++; }
                else { if(globalData[i+2] > globalData[i]+20) gUp++; else if(globalData[i] > globalData[i+1]+20) gDown++; }
            }

            // 2. МИКРО-ЗОНА (Последние 7% — самые свежие свечи)
            const microX = Math.floor(w * 0.93);
            const microData = ctx.getImageData(microX, 0, w - microX, h).data;
            let mUp = 0, mDown = 0, minY = h, maxY = 0;
            for(let i=0; i<microData.length; i+=16) {
                const r=microData[i], g=microData[i+1], b=microData[i+2];
                const y = Math.floor((i/4) / (w - microX));
                if((g > r+20) || (r > g+20) || (b > r+20)) {
                    if(y < minY) minY = y; if(y > maxY) maxY = y;
                    if(theme === 'green_red') { g > r ? mUp++ : mDown++; } else { b > r ? mUp++ : mDown++; }
                }
            }

            // ЛОГИКА РЕШЕНИЯ
            let isUp = gUp > gDown;
            let logic = t.trend;
            let score = 65;

            // OVERRIDE: Если в микро-зоне сильное движение против тренда (как на вашем скрине)
            if (mDown > mUp * 1.4 && isUp) {
                isUp = false; // Меняем сигнал на DOWN
                logic = t.rev;
                score = 82;
            } else if (mUp > mDown * 1.4 && !isUp) {
                isUp = true; // Меняем сигнал на UP
                logic = t.rev;
                score = 82;
            }

            // Визуализация
            ctx.strokeStyle = isUp ? "#00f281" : "#ff4b5c";
            ctx.lineWidth = 5;
            ctx.strokeRect(microX, minY, w-microX, maxY-minY);

            document.getElementById('screen-upload').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');
            
            document.getElementById('resSignal').innerText = isUp ? t.up : t.down;
            document.getElementById('resSignal').style.color = isUp ? "var(--accent)" : "var(--danger)";
            document.getElementById('resBorder').style.borderColor = isUp ? "var(--accent)" : "var(--danger)";
            document.getElementById('trend-status').innerText = logic;
            document.getElementById('impulse-power').innerText = (maxY-minY > h*0.2) ? t.high : t.stable;
            document.getElementById('rec-time').innerText = logic === t.rev ? "1-3 MIN" : "5-10 MIN";
            document.getElementById('resAccuracy').innerText = "Confidence: " + (score + Math.random()*10).toFixed(1) + "%";

            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        };
    </script>
</body>
</html>
