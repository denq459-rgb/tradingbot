<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kryon Algo Trade Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0c0f17;
            --card-bg: #161a24;
            --accent: #00f281;
            --text-main: #ffffff;
            --text-gray: #7a828a;
            --border: #232a35;
            --danger: #ff4b5c;
            --warning: #ff9d00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            padding: 25px 15px 15px;
            text-align: center;
            background: linear-gradient(to bottom, #11151e, var(--bg-color));
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .header-logo {
            width: 40px; height: 40px;
            background: var(--card-bg);
            border-radius: 12px;
            display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid var(--accent);
            margin-bottom: 10px; color: var(--accent); font-size: 22px;
            box-shadow: 0 0 15px rgba(0, 242, 129, 0.15);
        }
        .app-title { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: 0.5px; }
        .app-subtitle { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        
        .steps-bar {
            display: inline-flex; gap: 20px;
            background: #11151e; padding: 8px 20px;
            border-radius: 20px; font-size: 11px; color: var(--text-gray);
            margin-top: 20px; font-weight: bold; border: 1px solid #1a1f29;
        }
        .steps-bar span.active { color: var(--text-main); display: flex; align-items: center; gap: 6px; }
        .steps-bar span.active::before { content: '●'; color: var(--accent); }

        .content { 
            flex: 1; 
            padding: 20px 15px;
            padding-bottom: 120px; 
        }
        
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 24px;
            padding: 50px 15px;
            text-align: center;
            background: rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        #main-canvas { width: 100%; border-radius: 12px; display: none; margin-top: 10px; }
        .scan-line { position: absolute; left: 0; width: 100%; height: 3px; background: var(--accent); box-shadow: 0 0 20px var(--accent); display: none; z-index: 10; }
        .analysis-log { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 9px; color: var(--accent); text-align: left; z-index: 11; display: none; }

        .theme-selector {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-gray);
        }
        .theme-selector select {
            background: var(--card-bg);
            color: #fff;
            border: 1px solid var(--border);
            padding: 5px;
            border-radius: 8px;
            outline: none;
        }

        .result-card { 
            background: var(--card-bg); 
            border-radius: 28px; 
            padding: 35px 20px; 
            text-align: center; 
            border: 2px solid var(--border); 
            margin-bottom: 20px;
        }
        .signal-val { font-size: 52px; font-weight: 900; margin: 15px 0; letter-spacing: 1px; }
        
        .analysis-box {
            background: #11151e;
            border-radius: 14px;
            padding: 15px;
            margin-top: 25px;
            text-align: left;
            border-left: 3px solid var(--accent);
        }
        .analysis-item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: var(--text-gray); }
        .analysis-item b { color: #fff; }

        .btn-main {
            width: 100%;
            padding: 22px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0, 242, 129, 0.3);
            transition: 0.2s;
            margin-bottom: 20px;
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { background: #232a35; color: #555; box-shadow: none; }

        .lang-btn {
            background: #161a24; color: var(--accent); border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 10px; font-size: 11px; font-weight: bold;
            cursor: pointer; margin: 10px auto 0; display: block;
        }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%;
            background: #11151e; border-top: 1px solid var(--border);
            padding: 15px 0 35px 0; text-align: center; z-index: 1000;
        }
        .nav-item { color: var(--accent); font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-logo">📈</div>
        <h1 class="app-title">Kryon Algo Trade Bot</h1>
        <p class="app-subtitle">Multi-Zone AI Vision</p>
        <div class="steps-bar">
            <span id="step-upload" class="active">Upload</span>
            <span id="step-result">Signal</span>
        </div>
    </div>

    <div class="content">
        <div id="screen-upload" class="screen active">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div id="placeholder">
                    <div style="font-size: 55px; margin-bottom: 20px;">🖼️</div>
                    <div style="font-weight: 800; font-size: 18px;" id="t-upload-title">UPLOAD SCREENSHOT</div>
                    <div style="font-size: 11px; color: var(--text-gray); margin-top: 10px;" id="t-upload-desc">AI detects momentum shifts and pressure</div>
                </div>
                <div class="analysis-log" id="analysisLog"></div>
                <div class="scan-line" id="scanLine"></div>
                <canvas id="main-canvas"></canvas>
            </div>

            <div class="theme-selector">
                <span id="t-theme-label">Chart Colors:</span>
                <select id="colorTheme">
                    <option value="green_red">Green / Red</option>
                    <option value="blue_red">Blue / Red</option>
                    <option value="white_black">White / Black</option>
                </select>
            </div>

            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="window.handleImage(this)">
            <button id="visionBtn" class="btn-main" style="display:none; margin-top: 25px;" onclick="window.performUltraAnalysis()">Start Neural Scan</button>
            <button class="lang-btn" onclick="window.toggleLang()">RU / EN</button>
        </div>

        <div id="screen-result" class="screen">
            <div class="result-card" id="resBorder">
                <div style="color: var(--text-gray); font-size: 11px; letter-spacing: 1px;" id="t-res-label">KRYON AI ULTRA ANALYZER</div>
                <div id="resSignal" class="signal-val">---</div>
                <div id="resAccuracy" style="font-size: 20px; font-weight: bold; color: var(--accent);">Confidence: --%</div>
                
                <div class="analysis-box">
                    <div class="analysis-item"><span id="t-an-status">Logic:</span> <b id="trend-status">---</b></div>
                    <div class="analysis-item"><span id="t-an-impulse">Pressure:</span> <b id="impulse-power">---</b></div>
                    <div class="analysis-item"><span id="t-an-time">Rec. Time:</span> <b id="rec-time">---</b></div>
                </div>
            </div>
            <button class="btn-main" style="background: #232a35; color: #fff;" onclick="window.resetApp()">
                <span id="t-btn-new">New Analysis</span>
            </button>
        </div>
    </div>

    <div class="nav-bar"><div class="nav-item">⚡ Signals Active</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg.expand) tg.expand();
        tg.headerColor = "#11151e";

        window.lang = 'en';
        let canvas = document.getElementById('main-canvas');
        let ctx = canvas.getContext('2d', { willReadFrequently: true });

        const trans = {
            ru: {
                up_t: "ЗАГРУЗИТЬ СКРИНШОТ", up_d: "ИИ ищет ложные пробои и давление тренда",
                btn_scan: "Начать анализ", res_l: "KRYON AI ULTRA ANALYZER",
                an_s: "Логика:", an_i: "Давление:", an_t: "Время:",
                btn_new: "Новый анализ", up: "ВВЕРХ 🟢", down: "ВНИЗ 🔴",
                following: "По тренду", reversal: "РАЗВОРОТ (Отскок)",
                fake_rev: "ЛОЖНЫЙ ОТСКОК (Высокое давление)",
                stable: "Стабильное", shifting: "СМЕНА СИЛ", high_p: "КРИТИЧЕСКОЕ",
                log1: "> Считывание пикселей...", log2: "> Анализ зон...", log3: "> Поиск уровней...", log4: "> Проверка давления...", log5: "> Итоговый расчет...",
                th_l: "Цвета свечей:"
            },
            en: {
                up_t: "UPLOAD SCREENSHOT", up_d: "AI detects fakeouts and global pressure",
                btn_scan: "Start Neural Scan", res_l: "KRYON AI ULTRA ANALYZER",
                an_s: "Logic:", an_i: "Pressure:", an_t: "Rec. Time:",
                btn_new: "New Analysis", up: "CALL 🟢", down: "PUT 🔴",
                following: "Trend Following", reversal: "REVERSAL (Bounce)",
                fake_rev: "FAKE REVERSAL (High Pressure)",
                stable: "Stable", shifting: "SHIFT DETECTED", high_p: "HIGH PRESSURE",
                log1: "> Reading pixels...", log2: "> Zone analysis...", log3: "> Level detection...", log4: "> Pressure check...", log5: "> Finalizing...",
                th_l: "Chart Colors:"
            }
        };

        window.toggleLang = function() {
            window.lang = window.lang === 'en' ? 'ru' : 'en';
            const t = trans[window.lang];
            document.getElementById('t-upload-title').innerText = t.up_t;
            document.getElementById('t-upload-desc').innerText = t.up_d;
            document.getElementById('visionBtn').innerText = t.btn_scan;
            document.getElementById('t-res-label').innerText = t.res_l;
            document.getElementById('t-btn-new').innerText = t.btn_new;
            document.getElementById('t-an-status').innerText = t.an_s;
            document.getElementById('t-an-impulse').innerText = t.an_i;
            document.getElementById('t-an-time').innerText = t.an_t;
            document.getElementById('t-theme-label').innerText = t.th_l;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        window.handleImage = function(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Оптимизация размера для мобильных
                    const maxW = 1000;
                    const scale = img.width > maxW ? maxW / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('visionBtn').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        // УМНАЯ ФУНКЦИЯ ПОДСЧЕТА ЦВЕТОВ
        function getPixelDynamics(data) {
            const theme = document.getElementById('colorTheme').value;
            let up = 0, down = 0;

            for(let i=0; i < data.length; i += 16) {
                const r = data[i], g = data[i+1], b = data[i+2];

                if (theme === 'green_red') {
                    if (g > r + 20 && g > b + 20) up++;
                    else if (r > g + 20 && r > b + 20) down++;
                } 
                else if (theme === 'blue_red') {
                    if (b > r + 20 && g > r) up++; // Синий/Голубой
                    else if (r > g + 20 && r > b + 20) down++;
                } 
                else if (theme === 'white_black') {
                    if (r > 200 && g > 200 && b > 200) up++; // Белый
                    else if (r < 60 && g < 60 && b < 60 && r > 10) down++; // Темно-серый/Черный
                }
            }
            return { up, down };
        }

        window.performUltraAnalysis = async function() {
            const btn = document.getElementById('visionBtn');
            const line = document.getElementById('scanLine');
            const log = document.getElementById('analysisLog');
            const t = trans[window.lang];
            
            btn.disabled = true; 
            line.style.display = 'block'; 
            log.style.display = 'block'; 
            log.innerHTML = "";
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            for (let i = 1; i <= 5; i++) {
                log.innerHTML += t['log' + i] + "<br>";
                line.style.top = (i * 20) + "%";
                if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
                await new Promise(r => setTimeout(r, 600));
            }

            const w = canvas.width, h = canvas.height;
            // Делим изображение на зоны: история (60%), ближнее прошлое (20%), текущий сигнал (20%)
            const historyData = ctx.getImageData(0, 0, Math.floor(w*0.6), h).data;
            const nearPastData = ctx.getImageData(Math.floor(w*0.6), 0, Math.floor(w*0.2), h).data;
            const signalData = ctx.getImageData(Math.floor(w*0.8), 0, Math.floor(w*0.2), h).data;

            const hP = getPixelDynamics(historyData);
            const nP = getPixelDynamics(nearPastData);
            const sP = getPixelDynamics(signalData);

            // Логика давления
            const bearPressure = hP.down / (hP.up || 1);
            const bullPressure = hP.up / (hP.down || 1);
            
            const isReversalUp = (nP.down > nP.up * 1.3) && (sP.up > sP.down * 1.1);
            const isReversalDown = (nP.up > nP.down * 1.3) && (sP.down > sP.up * 1.1);

            let isUp = sP.up > sP.down;
            let status = t.following;
            let impulse = t.stable;
            let recTime = "5 - 10 MIN";

            if (isReversalUp) {
                if (bearPressure > 2.5) {
                    isUp = false; // Ложный отскок против мощного тренда
                    status = t.fake_rev;
                    impulse = t.high_p;
                    recTime = "1 - 2 MIN";
                } else {
                    isUp = true;
                    status = t.reversal;
                    impulse = t.shifting;
                    recTime = "2 - 5 MIN";
                }
            } else if (isReversalDown) {
                if (bullPressure > 2.5) {
                    isUp = true; 
                    status = t.fake_rev;
                    impulse = t.high_p;
                    recTime = "1 - 2 MIN";
                } else {
                    isUp = false;
                    status = t.reversal;
                    impulse = t.shifting;
                    recTime = "2 - 5 MIN";
                }
            }

            // Переключение экранов
            document.getElementById('screen-upload').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');
            window.scrollTo(0, 0);

            const resS = document.getElementById('resSignal');
            resS.innerText = isUp ? t.up : t.down;
            resS.style.color = isUp ? "var(--accent)" : "var(--danger)";
            document.getElementById('resBorder').style.borderColor = resS.style.color;
            document.getElementById('trend-status').innerText = status;
            document.getElementById('trend-status').style.color = (status.includes("РАЗВОРОТ") || status.includes("REVERSAL")) ? "var(--warning)" : "var(--accent)";
            document.getElementById('impulse-power').innerText = impulse;
            document.getElementById('rec-time').innerText = recTime;
            document.getElementById('resAccuracy').innerText = "Confidence: " + (68 + Math.random()*20).toFixed(1) + "%";

            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        };

        window.resetApp = function() { location.reload(); };
    </script>
</body>
</html>
