<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlfaBit Predictor Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #181a20;
            --accent: #98ff33;
            --text-main: #ffffff;
            --text-gray: #848e9c;
            --border-color: #2b2f36;
            --success: #02c076;
            --danger: #cf304a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* --- ХЕДЕР --- */
        .header { 
            position: sticky; top: 0; z-index: 1000;
            padding: 15px; background: var(--card-bg); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn { color: var(--accent); cursor: pointer; font-size: 22px; display: none; padding: 0 5px; }
        .header-title { font-size: 13px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        
        .lang-btn {
            background: #2b2f36; color: var(--accent); border: 1px solid var(--accent);
            padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer;
        }

        /* --- ЭКРАНЫ --- */
        .screen { display: none; flex-direction: column; width: 100%; min-height: 90vh; animation: fadeIn 0.2s ease; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Список пар */
        .pair-row { display: flex; align-items: center; padding: 20px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .pair-row:active { background: #1e2126; }
        .flag-icon { font-size: 22px; margin-right: 15px; width: 30px; text-align: center; }
        .symbol-main { font-size: 17px; font-weight: 600; }
        .trade-btn-fake { background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-left: auto; text-transform: uppercase; }

        /* Сетка времени */
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .timer-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px 10px; border-radius: 20px; text-align: center; cursor: pointer; }
        .timer-card:active { border-color: var(--accent); transform: scale(0.96); }
        .timer-val { font-size: 28px; font-weight: 900; color: var(--accent); display: block; }
        .timer-desc { font-size: 10px; color: var(--text-gray); text-transform: uppercase; margin-top: 5px; }

        /* Анализ */
        .signal-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
        .status-label { font-size: 12px; color: var(--text-gray); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1.5px; }

        .signal-card {
            width: 100%; max-width: 320px; height: 260px;
            background: var(--card-bg); border-radius: 35px; border: 2px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 40px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); transition: 0.3s;
        }

        .signal-image { width: 120px; height: 120px; object-fit: contain; margin-bottom: 15px; display: none; }
        .signal-text { font-size: 44px; font-weight: 900; text-transform: uppercase; }

        .action-btn { 
            width: 90%; max-width: 340px; padding: 22px; background: var(--accent); 
            color: #000; border: none; border-radius: 20px; 
            font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer;
        }
        .action-btn:disabled { background: #2b2f36; color: #555; }

        .pulse { animation: pulseAnim 1.5s infinite; border-color: var(--accent) !important; }
        @keyframes pulseAnim { 0% { transform: scale(1); } 50% { transform: scale(0.98); opacity: 0.6; } 100% { transform: scale(1); } }
        
        #hidden-chart { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div id="back-icon" class="back-btn" onclick="goBack()">❮</div>
            <span id="main-title" class="header-title">Торговые пары ↕</span>
        </div>
        <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">EN</button>
    </div>

    <!-- ЭКРАН 1 -->
    <div id="screen-main" class="screen active">
        <div class="pair-row" onclick="toTimer('EURUSD', 'EUR / USD')">
            <div class="flag-icon">🇪🇺</div><div class="pair-names"><span class="symbol-main">EUR / USD</span></div>
            <button class="trade-btn-fake btn-txt">Торговать</button>
        </div>
        <div class="pair-row" onclick="toTimer('GBPUSD', 'GBP / USD')">
            <div class="flag-icon">🇬🇧</div><div class="pair-names"><span class="symbol-main">GBP / USD</span></div>
            <button class="trade-btn-fake btn-txt">Торговать</button>
        </div>
        <div class="pair-row" onclick="toTimer('USDJPY', 'USD / JPY')">
            <div class="flag-icon">🇺🇸</div><div class="pair-names"><span class="symbol-main">USD / JPY</span></div>
            <button class="trade-btn-fake btn-txt">Торговать</button>
        </div>
        <div class="pair-row" onclick="toTimer('BTCUSDT', 'BTC / USDT')">
            <div class="flag-icon">₿</div><div class="pair-names"><span class="symbol-main">BTC / USDT</span></div>
            <button class="trade-btn-fake btn-txt">Торговать</button>
        </div>
    </div>

    <!-- ЭКРАН 2 -->
    <div id="screen-timer" class="screen">
        <div class="timer-grid">
            <div class="timer-card" onclick="toTrade('5s')"><span class="timer-val">5s</span><span class="timer-desc">Ultra Fast</span></div>
            <div class="timer-card" onclick="toTrade('15s')"><span class="timer-val">15s</span><span class="timer-desc">Fast</span></div>
            <div class="timer-card" onclick="toTrade('30s')"><span class="timer-val">30s</span><span class="timer-desc">Stable</span></div>
            <div class="timer-card" onclick="toTrade('1m')"><span class="timer-val">1m</span><span class="timer-desc">Normal</span></div>
        </div>
    </div>

    <!-- ЭКРАН 3 -->
    <div id="screen-trade" class="screen">
        <div style="padding: 10px 15px; background: #121418; display: flex; justify-content: space-between; font-size: 11px;">
            <span id="display-pair" style="font-weight: bold;">---</span>
            <span id="display-time" style="color: var(--accent); font-weight: 800;">---</span>
        </div>
        <div class="signal-area">
            <div id="status-text" class="status-label">Система готова</div>
            <div class="signal-card" id="sigCard">
                <img src="" id="sigImg" class="signal-image">
                <div id="sig-output" class="signal-text">READY</div>
            </div>
            <button id="get-btn" class="action-btn" onclick="runAnalysis()">ПОЛУЧИТЬ СИГНАЛ</button>
        </div>
    </div>

    <div id="hidden-chart"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let lang = 'ru';
        let currentSymbol = '';
        let currentPairName = '';
        let activeScreen = 'main';

        const content = {
            ru: {
                title1: "Торговые пары ↕", title2: "Время экспирации", title3: "ИИ Анализ",
                trade: "Торговать", get: "Получить сигнал", ready: "ГОТОВ", wait: "ЖДИТЕ",
                s1: "Система готова", s2: "Анализ рынка...", s3: "Завершено",
                up: "ВВЕРХ", down: "ВНИЗ"
            },
            en: {
                title1: "Trading Pairs ↕", title2: "Expiration Time", title3: "AI Analysis",
                trade: "Trade", get: "Get AI Signal", ready: "READY", wait: "WAIT",
                s1: "System ready", s2: "Scanning...", s3: "Done",
                up: "UP", down: "DOWN"
            }
        };

        function updateUI() {
            const t = content[lang];
            // Заголовки
            if(activeScreen === 'main') document.getElementById('main-title').innerText = t.title1;
            if(activeScreen === 'timer') document.getElementById('main-title').innerText = t.title2;
            if(activeScreen === 'trade') document.getElementById('main-title').innerText = t.title3;

            // Кнопки в списке
            document.querySelectorAll('.btn-txt').forEach(el => el.innerText = t.trade);
            // Кнопка анализа
            document.getElementById('get-btn').innerText = t.get;
            // Тексты в карточке (только если не в процессе анализа)
            if(!document.getElementById('sigCard').classList.contains('pulse')) {
                const out = document.getElementById('sig-output');
                if(out.innerText === 'READY' || out.innerText === 'ГОТОВ') out.innerText = t.ready;
            }
        }

        function toggleLang() {
            lang = lang === 'ru' ? 'en' : 'ru';
            document.getElementById('lang-toggle').innerText = lang === 'ru' ? 'EN' : 'RU';
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            activeScreen = id;
            document.getElementById('back-icon').style.display = id === 'main' ? 'none' : 'block';
            updateUI();
            window.scrollTo(0,0);
        }

        function toTimer(symbol, name) {
            currentSymbol = symbol;
            currentPairName = name;
            switchScreen('timer');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function toTrade(time) {
            document.getElementById('display-pair').innerText = currentPairName;
            document.getElementById('display-time').innerText = (lang === 'ru' ? 'АНАЛИЗ: ' : 'ANALYSIS: ') + time;
            switchScreen('trade');
            
            // Запуск скрипта в фоне
            new TradingView.widget({
                "symbol": "OANDA:" + currentSymbol,
                "container_id": "hidden-chart"
            });
        }

        function goBack() {
            if(activeScreen === 'trade') switchScreen('timer');
            else if(activeScreen === 'timer') switchScreen('main');
        }

        function runAnalysis() {
            const btn = document.getElementById('get-btn');
            const card = document.getElementById('sigCard');
            const txt = document.getElementById('sig-output');
            const img = document.getElementById('sigImg');
            const status = document.getElementById('status-text');
            const t = content[lang];

            btn.disabled = true;
            card.classList.add('pulse');
            img.style.display = 'none';
            txt.innerText = t.wait;
            status.innerText = t.s2;
            
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                const isUp = Math.random() > 0.5;
                btn.disabled = false;
                card.classList.remove('pulse');
                status.innerText = t.s3;
                img.style.display = 'block';

                if(isUp) {
                    img.src = 'up.png';
                    txt.innerText = t.up;
                    txt.style.color = 'var(--success)';
                    card.style.borderColor = 'var(--success)';
                } else {
                    img.src = 'down.png';
                    txt.innerText = t.down;
                    txt.style.color = 'var(--danger)';
                    card.style.borderColor = 'var(--danger)';
                }
                tg.HapticFeedback.notificationOccurred('success');
            }, 2500);
        }

        // Старт
        updateUI();
    </script>
</body>
</html>
