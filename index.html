<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kryon AI Trade Bot - Ultra Vision</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Интеграция с цветами Telegram */
            --bg-color: var(--tg-theme-bg-color, #0c0f17);
            --card-bg: var(--tg-theme-secondary-bg-color, #161a24);
            --accent: #00f281;
            --text-main: var(--tg-theme-text-color, #ffffff);
            --text-gray: #7a828a;
            --border: #232a35;
            --danger: #ff4b5c;
            --warning: #ff9d00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .app-header {
            padding: 30px 15px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent);
            border-bottom: 1px solid var(--border);
        }

        .header-logo {
            width: 44px; height: 44px;
            background: var(--card-bg);
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid var(--accent);
            margin-bottom: 12px; font-size: 24px;
            box-shadow: 0 0 20px rgba(0, 242, 129, 0.15);
        }

        .app-title { font-size: 22px; font-weight: 800; margin: 0; }
        .app-subtitle { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; opacity: 0.8; }
        
        .steps-bar {
            display: inline-flex; gap: 20px;
            background: rgba(0,0,0,0.3); padding: 8px 20px;
            border-radius: 20px; font-size: 11px; color: var(--text-gray);
            margin-top: 20px; border: 1px solid var(--border);
        }
        .steps-bar span.active { color: var(--accent); font-weight: bold; }

        .content { flex: 1; padding: 20px 15px 120px; }
        
        .screen { display: none; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 24px;
            padding: 50px 15px;
            text-align: center;
            background: rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        #main-canvas { 
            width: 100%; border-radius: 12px; display: none; 
            margin-top: 10px; border: 1px solid var(--border); 
        }

        /* Улучшенная линия сканирования */
        .scan-line { 
            position: absolute; left: 0; width: 100%; height: 4px; 
            background: var(--accent); 
            box-shadow: 0 0 20px var(--accent), 0 0 10px var(--accent);
            display: none; z-index: 10; pointer-events: none;
            top: 0;
            transition: top 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .analysis-log { 
            position: absolute; top: 10px; left: 10px; 
            font-family: monospace; font-size: 10px; color: var(--accent); 
            text-align: left; z-index: 11; display: none; 
            background: rgba(0,0,0,0.7); padding: 8px; border-radius: 6px;
            max-width: 80%; line-height: 1.4;
        }

        .theme-selector {
            margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; 
            font-size: 13px; color: var(--text-gray);
        }
        .theme-selector select { 
            background: var(--card-bg); color: #fff; border: 1px solid var(--border); 
            padding: 6px 12px; border-radius: 10px; outline: none; 
        }

        .result-card { 
            background: var(--card-bg); border-radius: 28px; padding: 35px 20px; 
            text-align: center; border: 2px solid var(--border); transition: 0.5s;
        }
        .signal-val { font-size: 52px; font-weight: 900; margin: 15px 0; letter-spacing: 1px; }
        
        .analysis-box {
            background: rgba(0,0,0,0.2); border-radius: 16px; padding: 18px; 
            margin-top: 25px; text-align: left; border-left: 4px solid var(--accent);
        }
        .analysis-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; color: var(--text-gray); }
        .analysis-item b { color: #fff; }

        .btn-main {
            width: 100%; padding: 20px; background: var(--accent); color: #000; 
            border: none; border-radius: 18px; font-weight: 800; font-size: 16px; 
            cursor: pointer; text-transform: uppercase; margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0, 242, 129, 0.2); transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.8; }
        .btn-main:disabled { background: #232a35; color: #555; box-shadow: none; }

        .lang-btn {
            background: transparent; color: var(--text-gray); border: 1px solid var(--border); 
            padding: 8px 16px; border-radius: 12px; font-size: 11px; cursor: pointer; 
            margin: 10px auto; display: block;
        }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; 
            background: var(--bg-color); border-top: 1px solid var(--border); 
            padding: 15px 0 calc(15px + var(--tg-viewport-bottom-offset, 0px)); 
            text-align: center; z-index: 1000;
        }
        .nav-item { color: var(--accent); font-size: 10px; font-weight: bold; letter-spacing: 1px; opacity: 0.8; }

    </style>
</head>
<body>

    <div class="app-header">
        <div class="header-logo">📈</div>
        <h1 class="app-title">Kryon AI</h1>
        <p class="app-subtitle">Ultra Momentum Vision v4.2</p>
        <div class="steps-bar">
            <span id="step-upload" class="active" data-i18n="step_up">Upload</span>
            <span id="step-result" data-i18n="step_res">Signal</span>
        </div>
    </div>

    <div class="content">
        <!-- Экран загрузки -->
        <div id="screen-upload" class="screen active">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div id="placeholder">
                    <div style="font-size: 50px; margin-bottom: 15px;">🖼️</div>
                    <div style="font-weight: 800; font-size: 18px;" data-i18n="up_t">UPLOAD CHART</div>
                    <div style="font-size: 12px; color: var(--text-gray); margin-top: 8px; line-height: 1.4;" data-i18n="up_d">AI will detect trend exhaustion<br>and momentum reversal</div>
                </div>
                <div class="analysis-log" id="analysisLog"></div>
                <div class="scan-line" id="scanLine"></div>
                <canvas id="main-canvas"></canvas>
            </div>

            <div class="theme-selector">
                <span data-i18n="th_l">Candle Colors:</span>
                <select id="colorTheme">
                    <option value="green_red">Green / Red</option>
                    <option value="blue_red">Blue / Red</option>
                </select>
            </div>

            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImage(this)">
            <button id="visionBtn" class="btn-main" style="display:none; margin-top: 30px;" onclick="startNeuralScan()" data-i18n="btn_scan">Run Neural Scan</button>
            <button class="lang-btn" onclick="toggleLang()">RU / EN</button>
        </div>

        <!-- Экран результата -->
        <div id="screen-result" class="screen">
            <div class="result-card" id="resBorder">
                <div style="color: var(--text-gray); font-size: 11px; letter-spacing: 1px; font-weight: bold;" data-i18n="res_l">KRYON AI ANALYSIS RESULT</div>
                <div id="resSignal" class="signal-val">---</div>
                <div id="resAccuracy" style="font-size: 20px; font-weight: bold; color: var(--accent);">Confidence: --%</div>
                
                <div class="analysis-box">
                    <div class="analysis-item"><span data-i18n="an_s">Strategy:</span> <b id="trend-status">---</b></div>
                    <div class="analysis-item"><span data-i18n="an_i">Volatility:</span> <b id="impulse-power">---</b></div>
                    <div class="analysis-item"><span data-i18n="an_t">Timeframe:</span> <b id="rec-time">---</b></div>
                </div>
            </div>
            <button class="btn-main" style="background: #232a35; color: #fff; margin-top: 25px;" onclick="location.reload()">
                <span data-i18n="btn_new">New Analysis</span>
            </button>
        </div>
    </div>

    <div class="nav-bar"><div class="nav-item">⚡ NEURAL ENGINE ACTIVE</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = tg.themeParams.bg_color || "#11151e";

        let currentLang = 'ru';
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        const trans = {
            ru: {
                step_up: "Загрузка", step_res: "Сигнал",
                up_t: "ЗАГРУЗИТЬ ГРАФИК", up_d: "ИИ ищет точки входа и<br>разворотные импульсы",
                btn_scan: "Начать сканирование", res_l: "РЕЗУЛЬТАТ KRYON AI",
                an_s: "Стратегия:", an_i: "Волатильность:", an_t: "Реком. время:",
                btn_new: "Новый анализ", up: "ВВЕРХ 🟢", down: "ВНИЗ 🔴",
                following: "Следование тренду", reversal: "Контр-тренд (Разворот)",
                stable: "Низкая", high_p: "Высокая (Импульс)",
                log1: "> Инициализация зрения...", log2: "> Поиск свечных паттернов...", log3: "> Фильтрация шумов...", log4: "> Проверка зон перекупленности...", log5: "> Формирование сигнала...",
                th_l: "Цвета свечей:", err_no_chart: "Ошибка: График не обнаружен. Попробуйте другой скриншот."
            },
            en: {
                step_up: "Upload", step_res: "Signal",
                up_t: "UPLOAD CHART", up_d: "AI detects trend exhaustion<br>and momentum reversal",
                btn_scan: "Run Neural Scan", res_l: "KRYON AI ANALYSIS RESULT",
                an_s: "Strategy:", an_i: "Volatility:", an_t: "Rec. Time:",
                btn_new: "New Analysis", up: "CALL 🟢", down: "PUT 🔴",
                following: "Trend Following", reversal: "Momentum Reversal",
                stable: "Stable/Low", high_p: "High Impulse",
                log1: "> Initializing vision...", log2: "> Detecting candle patterns...", log3: "> Noise filtering...", log4: "> Checking OB/OS levels...", log5: "> Generating signal...",
                th_l: "Chart Colors:", err_no_chart: "Error: No chart detected. Please use a clearer screenshot."
            }
        };

        function updateLocalization() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (trans[currentLang][key]) el.innerHTML = trans[currentLang][key];
            });
        }

        window.toggleLang = function() {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            updateLocalization();
        };

        updateLocalization();

        window.handleImage = function(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Оптимизация: ограничиваем размер для скорости анализа
                    const maxDim = 800;
                    let w = img.width, h = img.height;
                    if (w > h && w > maxDim) { h *= maxDim/w; w = maxDim; }
                    else if (h > maxDim) { w *= maxDim/h; h = maxDim; }
                    
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    canvas.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('visionBtn').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.startNeuralScan = async function() {
            const btn = document.getElementById('visionBtn');
            const line = document.getElementById('scanLine');
            const log = document.getElementById('analysisLog');
            const t = trans[currentLang];
            
            btn.disabled = true;
            btn.style.opacity = '0.5';
            line.style.display = 'block';
            log.style.display = 'block';
            log.innerHTML = "";

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            // Запуск плавной анимации линии через CSS
            setTimeout(() => { line.style.top = "100%"; }, 50);

            // Имитация логов
            for (let i = 1; i <= 5; i++) {
                log.innerHTML += `<div>${t['log' + i]}</div>`;
                if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
                await new Promise(r => setTimeout(r, 600));
            }

            const analysis = performAnalysis();
            if (!analysis) {
                alert(t.err_no_chart);
                location.reload();
                return;
            }

            showResults(analysis);
        };

        function performAnalysis() {
            const theme = document.getElementById('colorTheme').value;
            const w = canvas.width;
            const h = canvas.height;
            const data = ctx.getImageData(0, 0, w, h).data;
            
            let gUp = 0, gDown = 0;
            let totalColored = 0;

            // Уменьшили шаг до 40 для более плотного сканирования (в 2 раза точнее)
            for(let i = 0; i < data.length; i += 40) { 
                const r = data[i], g = data[i+1], b = data[i+2];
                
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                
                // Порог насыщенности снижен с 40 до 15. 
                // Это позволяет видеть тусклые свечи на темном фоне.
                if (max - min < 15) continue; 

                if(theme === 'green_red') {
                    // Снижена требуемая разница каналов с 30 до 15
                    if(g > r + 15) gUp++; 
                    else if(r > g + 15) gDown++;
                } else {
                    if(b > r + 15) gUp++; 
                    else if(r > g + 15) gDown++;
                }
            }

            totalColored = gUp + gDown;
            
            // Порог валидации снижен в 10 раз (с 0.05 до 0.005). 
            // Теперь бот увидит график, даже если он занимает малую часть скриншота.
            const minDetectionThreshold = (data.length / 40) * 0.005;

            if (totalColored < minDetectionThreshold) return null;

            const isUp = gDown > gUp; 
            const confidence = Math.min(68 + (Math.random() * 22), 98.4).toFixed(1);
            
            return {
                isUp,
                confidence,
                volatility: totalColored > (data.length / 40) * 0.1 ? 'high' : 'stable'
            };
        }

        function showResults(res) {
            const t = trans[currentLang];
            document.getElementById('screen-upload').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');
            document.getElementById('step-upload').classList.remove('active');
            document.getElementById('step-result').classList.add('active');
            
            const resS = document.getElementById('resSignal');
            resS.innerText = res.isUp ? t.up : t.down;
            resS.style.color = res.isUp ? "var(--accent)" : "var(--danger)";
            
            document.getElementById('resBorder').style.borderColor = resS.style.color;
            document.getElementById('resAccuracy').innerText = `Confidence: ${res.confidence}%`;
            document.getElementById('trend-status').innerText = Math.random() > 0.5 ? t.following : t.reversal;
            document.getElementById('impulse-power').innerText = res.volatility === 'high' ? t.high_p : t.stable;
            document.getElementById('rec-time').innerText = res.isUp ? "2-5 MIN" : "1-3 MIN";

            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
