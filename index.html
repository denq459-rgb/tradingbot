<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlfaBit AI Predictor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #181a20;
            --accent: #98ff33;
            --text-main: #ffffff;
            --text-gray: #848e9c;
            --border-color: #2b2f36;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- ОБЩИЕ СТИЛИ ЭКРАНОВ --- */
        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header {
            padding: 20px 15px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title { font-size: 14px; font-weight: 600; color: var(--text-gray); text-transform: uppercase; }

        /* --- ЭКРАН 1: ВЫБОР ПАР --- */
        .pair-row {
            display: flex;
            align-items: center;
            padding: 16px 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .pair-row:active { background: #1e2126; }
        .coin-icon { width: 36px; height: 36px; background: #2b2f36; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 16px; }
        .symbol-main { font-size: 16px; font-weight: bold; }
        .trade-btn-sm { background: var(--accent); color: #000; border: none; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 800; margin-left: auto; }

        /* --- ЭКРАН 2: ВЫБОР ТАЙМЕРА --- */
        .timer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }
        .timer-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            transition: 0.2s;
        }
        .timer-card:active { border-color: var(--accent); transform: scale(0.95); }
        .timer-val { font-size: 24px; font-weight: 900; color: var(--accent); display: block; }
        .timer-desc { font-size: 10px; color: var(--text-gray); text-transform: uppercase; margin-top: 5px; }

        /* --- ЭКРАН 3: ТОРГОВЛЯ --- */
        .chart-box { width: 100%; height: 280px; background: #000; }
        .signal-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .hexagon {
            position: relative; width: 130px; height: 150px; background: var(--card-bg); border: 2px solid var(--accent);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px;
        }
        .action-btn { width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 14px; font-weight: 900; font-size: 16px; box-shadow: 0 5px 15px rgba(152, 255, 51, 0.2); }

        .pulse { animation: pulseAnim 1.5s infinite; }
        @keyframes pulseAnim { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    </style>
</head>
<body>

    <!-- ЭКРАН 1: ВЫБОР ПАР -->
    <div id="screen-main" class="screen active">
        <div class="header"><span class="header-title">Выберите актив ↕</span></div>
        <div class="pair-row" onclick="toTimer('BTCUSDT', 'BTC / USDT')">
            <div class="coin-icon">₿</div>
            <div style="display:flex; flex-direction:column;"><span class="symbol-main">BTC / USDT</span><span style="font-size:10px; color:var(--text-gray);">Bitcoin</span></div>
            <button class="trade-btn-sm">Выбрать</button>
        </div>
        <div class="pair-row" onclick="toTimer('ETHUSDT', 'ETH / USDT')">
            <div class="coin-icon">Ξ</div>
            <div style="display:flex; flex-direction:column;"><span class="symbol-main">ETH / USDT</span><span style="font-size:10px; color:var(--text-gray);">Ethereum</span></div>
            <button class="trade-btn-sm">Выбрать</button>
        </div>
        <div class="pair-row" onclick="toTimer('TONUSDT', 'TON / USDT')">
            <div class="coin-icon">T</div>
            <div style="display:flex; flex-direction:column;"><span class="symbol-main">TON / USDT</span><span style="font-size:10px; color:var(--text-gray);">Toncoin</span></div>
            <button class="trade-btn-sm">Выбрать</button>
        </div>
    </div>

    <!-- ЭКРАН 2: ВЫБОР ТАЙМЕРА -->
    <div id="screen-timer" class="screen">
        <div class="header">
            <div onclick="showScreen('screen-main')" style="color:var(--accent); cursor:pointer;">❮</div>
            <span class="header-title">Выберите время анализа</span>
        </div>
        <div class="timer-grid">
            <div class="timer-card" onclick="toTrade('5s')"><span class="timer-val">5s</span><span class="timer-desc">Ultra Fast</span></div>
            <div class="timer-card" onclick="toTrade('15s')"><span class="timer-val">15s</span><span class="timer-desc">Fast</span></div>
            <div class="timer-card" onclick="toTrade('30s')"><span class="timer-val">30s</span><span class="timer-desc">Stable</span></div>
            <div class="timer-card" onclick="toTrade('1m')"><span class="timer-val">1m</span><span class="timer-desc">Medium</span></div>
        </div>
    </div>

    <!-- ЭКРАН 3: АНАЛИЗ -->
    <div id="screen-trade" class="screen">
        <div class="header">
            <div onclick="showScreen('screen-timer')" style="color:var(--accent); cursor:pointer;">❮</div>
            <div style="display:flex; flex-direction:column;">
                <span id="active-pair" style="font-size:14px; font-weight:bold;">BTC/USDT</span>
                <span id="active-timer" style="font-size:10px; color:var(--accent);">Time: 5s</span>
            </div>
        </div>

        <div id="chart" class="chart-box"></div>

        <div class="signal-area">
            <div class="hexagon" id="sigBox">
                <div id="sig-icon" style="font-size:30px;">📡</div>
                <div id="sig-text" style="font-weight:900; margin-top:5px;">READY</div>
            </div>
            <button class="action-btn" id="aiBtn" onclick="startScan()">ПОЛУЧИТЬ СИГНАЛ</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let selectedPair = "";
        let selectedSymbol = "";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function toTimer(symbol, pairName) {
            selectedSymbol = symbol;
            selectedPair = pairName;
            showScreen('screen-timer');
        }

        function toTrade(time) {
            document.getElementById('active-pair').innerText = selectedPair;
            document.getElementById('active-timer').innerText = "Индикатор: " + time;
            showScreen('screen-trade');
            
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + selectedSymbol,
                "interval": "1",
                "theme": "dark",
                "style": "1",
                "locale": "ru",
                "hide_top_toolbar": true,
                "container_id": "chart"
            });
        }

        function startScan() {
            const btn = document.getElementById('aiBtn');
            const box = document.getElementById('sigBox');
            const icon = document.getElementById('sig-icon');
            const text = document.getElementById('sig-text');

            btn.disabled = true;
            box.classList.add('pulse');
            icon.innerText = '⚙️';
            text.innerText = 'АНАЛИЗ...';
            text.style.color = '#fff';
            
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                const isUp = Math.random() > 0.5;
                btn.disabled = false;
                box.classList.remove('pulse');
                
                if(isUp) {
                    icon.innerText = '📈';
                    text.innerText = 'ВВЕРХ';
                    text.style.color = '#02c076';
                    box.style.borderColor = '#02c076';
                } else {
                    icon.innerText = '📉';
                    text.innerText = 'ВНИЗ';
                    text.style.color = '#cf304a';
                    box.style.borderColor = '#cf304a';
                }
                tg.HapticFeedback.notificationOccurred('success');
            }, 2500);
        }
    </script>
</body>
</html>
