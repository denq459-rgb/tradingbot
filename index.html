<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlfaBit Pro Predictor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #181a20;
            --accent: #98ff33;
            --text-main: #ffffff;
            --text-gray: #848e9c;
            --border-color: #2b2f36;
            --success: #02c076;
            --danger: #cf304a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        .header { 
            position: sticky; top: 0; z-index: 100;
            padding: 20px 15px; 
            background: var(--card-bg); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; align-items: center; gap: 15px; 
        }
        .header-title { font-size: 13px; font-weight: 600; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.8px; }

        .screen { display: none; flex-direction: column; width: 100%; min-height: 90vh; animation: fadeIn 0.2s ease; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Список пар */
        .pair-row { display: flex; align-items: center; padding: 18px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .pair-row:active { background: #1e2126; }
        .flag-icon { font-size: 20px; margin-right: 12px; width: 32px; text-align: center; }
        .symbol-main { font-size: 16px; font-weight: bold; }
        .trade-btn-sm { background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 800; margin-left: auto; pointer-events: none; }

        /* Таймер */
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .timer-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px; border-radius: 16px; text-align: center; cursor: pointer; }
        .timer-card:active { border-color: var(--accent); transform: scale(0.96); }
        .timer-val { font-size: 26px; font-weight: 900; color: var(--accent); display: block; }
        .timer-desc { font-size: 10px; color: var(--text-gray); text-transform: uppercase; margin-top: 6px; }

        /* Анализ */
        .signal-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; }
        .status-label { font-size: 12px; color: var(--text-gray); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        .signal-card {
            width: 100%; max-width: 320px; height: 250px;
            background: var(--card-bg); border-radius: 32px; border: 2px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 40px; transition: all 0.5s ease; box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }

        .signal-image { width: 120px; height: 120px; object-fit: contain; margin-bottom: 15px; display: none; }
        .signal-text { font-size: 42px; font-weight: 900; text-transform: uppercase; }

        .action-btn { 
            width: 100%; max-width: 320px; padding: 22px; background: var(--accent); 
            color: #000; border: none; border-radius: 20px; 
            font-weight: 900; font-size: 18px; text-transform: uppercase;
        }
        .action-btn:disabled { background: #2b2f36; color: #555; }

        .pulse { animation: pulseAnim 1.5s infinite; border-color: var(--accent) !important; }
        @keyframes pulseAnim { 0% { transform: scale(1); } 50% { transform: scale(0.97); opacity: 0.6; } 100% { transform: scale(1); } }

        /* Скрытый график */
        #chart-temp { display: none; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ТОРГОВЫЕ ПАРЫ -->
    <div id="screen-main" class="screen active">
        <div class="header"><span class="header-title">Торговые пары ↕</span></div>
        <div class="pair-row" onclick="toTimer('EURUSD', 'EUR / USD')">
            <div class="flag-icon">🇪🇺</div><div class="pair-names"><span class="symbol-main">EUR / USD</span></div><button class="trade-btn-sm">Торговать</button>
        </div>
        <div class="pair-row" onclick="toTimer('GBPUSD', 'GBP / USD')">
            <div class="flag-icon">🇬🇧</div><div class="pair-names"><span class="symbol-main">GBP / USD</span></div><button class="trade-btn-sm">Торговать</button>
        </div>
        <div class="pair-row" onclick="toTimer('USDJPY', 'USD / JPY')">
            <div class="flag-icon">🇺🇸</div><div class="pair-names"><span class="symbol-main">USD / JPY</span></div><button class="trade-btn-sm">Торговать</button>
        </div>
        <div class="pair-row" onclick="toTimer('AUDUSD', 'AUD / USD')">
            <div class="flag-icon">🇦🇺</div><div class="pair-names"><span class="symbol-main">AUD / USD</span></div><button class="trade-btn-sm">Торговать</button>
        </div>
    </div>

    <!-- ЭКРАН 2: ВРЕМЯ -->
    <div id="screen-timer" class="screen">
        <div class="header">
            <div onclick="showScreen('screen-main')" style="color:var(--accent); cursor:pointer; font-size:20px; padding-right:10px;">❮</div>
            <span class="header-title">Время экспирации</span>
        </div>
        <div class="timer-grid">
            <div class="timer-card" onclick="toTrade('5s')"><span class="timer-val">5s</span><span class="timer-desc">Ultra Fast</span></div>
            <div class="timer-card" onclick="toTrade('15s')"><span class="timer-val">15s</span><span class="timer-desc">Fast</span></div>
            <div class="timer-card" onclick="toTrade('30s')"><span class="timer-val">30s</span><span class="timer-desc">Stable</span></div>
            <div class="timer-card" onclick="toTrade('1m')"><span class="timer-val">1m</span><span class="timer-desc">Normal</span></div>
        </div>
    </div>

    <!-- ЭКРАН 3: АНАЛИЗ -->
    <div id="screen-trade" class="screen">
        <div class="header">
            <div onclick="showScreen('screen-timer')" style="color:var(--accent); cursor:pointer; font-size:20px; padding-right:10px;">❮</div>
            <div style="display:flex; flex-direction:column;">
                <span id="active-pair" style="font-size:14px; font-weight:bold;">EUR/USD</span>
                <span id="active-timer" style="font-size:10px; color:var(--accent); font-weight:800;">АНАЛИЗ: 5s</span>
            </div>
        </div>

        <div id="chart-temp"></div>

        <div class="signal-area">
            <div class="status-label" id="statusLabel">Система готова</div>
            <div class="signal-card" id="sigCard">
                <img src="" id="sigImg" class="signal-image">
                <div id="sig-text" class="signal-text">READY</div>
            </div>
            <button class="action-btn" id="aiBtn" onclick="startScan()">ПОЛУЧИТЬ СИГНАЛ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let selectedPairName = "";
        let selectedPairSymbol = "";

        // Базовая функция переключения
        function showScreen(screenId) {
            // Скрываем все экраны
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            // Показываем нужный
            const target = document.getElementById(screenId);
            if(target) target.classList.add('active');
            
            window.scrollTo(0, 0);
            tg.HapticFeedback.impactOccurred('light');
        }

        // Шаг 1 -> Шаг 2
        function toTimer(symbol, name) {
            selectedPairSymbol = symbol;
            selectedPairName = name;
            showScreen('screen-timer');
        }

        // Шаг 2 -> Шаг 3
        function toTrade(timeValue) {
            document.getElementById('active-pair').innerText = selectedPairName;
            document.getElementById('active-timer').innerText = "АНАЛИЗ: " + timeValue;
            
            showScreen('screen-trade');

            // Технический запуск скрипта графика в фоне
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "OANDA:" + selectedPairSymbol,
                    "interval": "1",
                    "theme": "dark",
                    "container_id": "chart-temp"
                });
            }
        }

        // Логика кнопки анализа
        function startScan() {
            const btn = document.getElementById('aiBtn');
            const card = document.getElementById('sigCard');
            const icon = document.getElementById('sigImg');
            const text = document.getElementById('sig-text');
            const status = document.getElementById('statusLabel');

            btn.disabled = true;
            card.classList.add('pulse');
            status.innerText = 'Анализ рынка...';
            icon.style.display = 'none';
            text.innerText = 'WAIT';
            text.style.color = '#fff';
            card.style.borderColor = "#2b2f36";
            
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                const isUp = Math.random() > 0.5;
                btn.disabled = false;
                card.classList.remove('pulse');
                status.innerText = 'Результат получен';
                icon.style.display = 'block';
                
                if(isUp) {
                    icon.src = 'up.png'; 
                    text.innerText = 'ВВЕРХ';
                    text.style.color = '#02c076';
                    card.style.borderColor = '#02c076';
                } else {
                    icon.src = 'down.png';
                    text.innerText = 'ВНИЗ';
                    text.style.color = '#cf304a';
                    card.style.borderColor = '#cf304a';
                }
                tg.HapticFeedback.notificationOccurred('success');
            }, 2500);
        }
    </script>
</body>
</html>
