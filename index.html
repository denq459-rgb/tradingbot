<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlfaBit Predictor Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #181a20;
            --accent: #98ff33;
            --text-main: #ffffff;
            --text-gray: #848e9c;
            --border-color: #2b2f36;
            --success: #02c076;
            --danger: #cf304a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        .header { 
            position: sticky; top: 0; z-index: 1000;
            padding: 15px; background: var(--card-bg); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn { color: var(--accent); cursor: pointer; font-size: 22px; display: none; padding: 0 5px; }
        .header-title { font-size: 13px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        
        .lang-btn {
            background: #2b2f36; color: var(--accent); border: 1px solid var(--accent);
            padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer;
        }

        .screen { display: none; flex-direction: column; width: 100%; min-height: 90vh; animation: fadeIn 0.2s ease; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Экран 1 */
        .pair-row { display: flex; align-items: center; padding: 20px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .pair-row:active { background: #1e2126; }
        .flag-icon { font-size: 22px; margin-right: 15px; width: 30px; text-align: center; }
        .symbol-main { font-size: 17px; font-weight: 600; }
        .trade-btn-fake { background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-left: auto; text-transform: uppercase; pointer-events: none; }

        /* Экран 2 */
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .timer-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 25px 10px; border-radius: 20px; text-align: center; cursor: pointer; }
        .timer-card:active { border-color: var(--accent); transform: scale(0.96); }
        .timer-val { font-size: 28px; font-weight: 900; color: var(--accent); display: block; }
        .timer-desc { font-size: 10px; color: var(--text-gray); text-transform: uppercase; margin-top: 5px; }

        /* Экран 3 */
        .top-info-bar { padding: 12px 15px; background: #121418; display: flex; justify-content: space-between; font-size: 11px; border-bottom: 1px solid #1e2329; }
        .signal-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
        .status-label { font-size: 12px; color: var(--text-gray); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1.5px; }

        .signal-card {
            width: 100%; max-width: 320px; height: 260px;
            background: var(--card-bg); border-radius: 35px; border: 2px solid var(--border-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 40px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); transition: 0.3s;
        }

        .signal-image { width: 120px; height: 120px; object-fit: contain; margin-bottom: 15px; display: none; }
        .signal-text { font-size: 44px; font-weight: 900; text-transform: uppercase; text-align: center; }

        .action-btn { 
            width: 90%; max-width: 340px; padding: 22px; background: var(--accent); 
            color: #000; border: none; border-radius: 20px; 
            font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer;
        }
        .action-btn:disabled { background: #2b2f36; color: #555; }

        .pulse { animation: pulseAnim 1.5s infinite; border-color: var(--accent) !important; }
        @keyframes pulseAnim { 0% { transform: scale(1); } 50% { transform: scale(0.98); opacity: 0.6; } 100% { transform: scale(1); } }
        #hidden-chart { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div id="back-icon" class="back-btn" onclick="goBack()">❮</div>
            <span id="main-title" class="header-title">Торговые пары ↕</span>
        </div>
        <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">EN</button>
    </div>

    <!-- ЭКРАН 1: СПИСОК ПАР -->
    <div id="screen-main" class="screen active">
        <div class="pair-row" onclick="toTimer('EURUSD', 'EUR / USD')">
            <div class="flag-icon">🇪🇺</div><div class="pair-names"><span class="symbol-main">EUR / USD</span></div>
            <button class="trade-btn-fake t-trade">Торговать</button>
        </div>
        <div class="pair-row" onclick="toTimer('GBPUSD', 'GBP / USD')">
            <div class="flag-icon">🇬🇧</div><div class="pair-names"><span class="symbol-main">GBP / USD</span></div>
            <button class="trade-btn-fake t-trade">Торговать</button>
        </div>
        <div class="pair-row" onclick="toTimer('USDJPY', 'USD / JPY')">
            <div class="flag-icon">🇺🇸</div><div class="pair-names"><span class="symbol-main">USD / JPY</span></div>
            <button class="trade-btn-fake t-trade">Торговать</button>
        </div>
        <div class="pair-row" onclick="toTimer('BTCUSDT', 'BTC / USDT')">
            <div class="flag-icon">₿</div><div class="pair-names"><span class="symbol-main">BTC / USDT</span></div>
            <button class="trade-btn-fake t-trade">Торговать</button>
        </div>
    </div>

    <!-- ЭКРАН 2: ВЫБОР ВРЕМЕНИ -->
    <div id="screen-timer" class="screen">
        <div class="timer-grid">
            <div class="timer-card" onclick="toTrade('5s')">
                <span class="timer-val">5s</span>
                <span class="timer-desc t-time-1">Ultra Fast</span>
            </div>
            <div class="timer-card" onclick="toTrade('15s')">
                <span class="timer-val">15s</span>
                <span class="timer-desc t-time-2">Fast</span>
            </div>
            <div class="timer-card" onclick="toTrade('30s')">
                <span class="timer-val">30s</span>
                <span class="timer-desc t-time-3">Stable</span>
            </div>
            <div class="timer-card" onclick="toTrade('1m')">
                <span class="timer-val">1m</span>
                <span class="timer-desc t-time-4">Normal</span>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 3: АНАЛИЗ -->
    <div id="screen-trade" class="screen">
        <div class="top-info-bar">
            <span id="display-pair" style="font-weight: bold;">---</span>
            <span id="display-time-label" style="color: var(--accent); font-weight: 800;">---</span>
        </div>
        <div class="signal-area">
            <div id="status-text" class="status-label">Система готова</div>
            <div class="signal-card" id="sigCard">
                <img src="" id="sigImg" class="signal-image">
                <div id="sig-output" class="signal-text">READY</div>
            </div>
            <button id="get-btn" class="action-btn" onclick="runAnalysis()">ПОЛУЧИТЬ СИГНАЛ</button>
        </div>
    </div>

    <div id="hidden-chart"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let lang = 'ru';
        let currentSymbol = '';
        let currentPairName = '';
        let activeScreen = 'main';
        let currentTimeValue = '';

        const translations = {
            ru: {
                titleMain: "Торговые пары ↕",
                titleTimer: "Время экспирации",
                titleTrade: "ИИ Анализ",
                tradeBtn: "Торговать",
                getSignal: "Получить сигнал",
                ready: "ГОТОВ",
                wait: "ЖДИТЕ",
                statusReady: "Система готова",
                statusScanning: "Анализ рынка...",
                statusDone: "Завершено",
                up: "ВВЕРХ",
                down: "ВНИЗ",
                analysisLabel: "АНАЛИЗ: ",
                time1: "Сверхбыстро",
                time2: "Быстро",
                time3: "Стабильно",
                time4: "Нормально"
            },
            en: {
                titleMain: "Trading Pairs ↕",
                titleTimer: "Expiration Time",
                titleTrade: "AI Analysis",
                tradeBtn: "Trade",
                getSignal: "Get AI Signal",
                ready: "READY",
                wait: "WAIT",
                statusReady: "System ready",
                statusScanning: "Scanning...",
                statusDone: "Done",
                up: "UP",
                down: "DOWN",
                analysisLabel: "ANALYSIS: ",
                time1: "Ultra Fast",
                time2: "Fast",
                time3: "Stable",
                time4: "Normal"
            }
        };

        function updateUI() {
            const t = translations[lang];
            
            // 1. Заголовки (Хедер)
            if(activeScreen === 'main') document.getElementById('main-title').innerText = t.titleMain;
            if(activeScreen === 'timer') document.getElementById('main-title').innerText = t.titleTimer;
            if(activeScreen === 'trade') document.getElementById('main-title').innerText = t.titleTrade;

            // 2. Экран 1: Кнопки "Торговать"
            document.querySelectorAll('.t-trade').forEach(el => el.innerText = t.tradeBtn);

            // 3. Экран 2: Описания времени
            document.querySelector('.t-time-1').innerText = t.time1;
            document.querySelector('.t-time-2').innerText = t.time2;
            document.querySelector('.t-time-3').innerText = t.time3;
            document.querySelector('.t-time-4').innerText = t.time4;

            // 4. Экран 3: Верхняя плашка
            if(currentTimeValue) {
                document.getElementById('display-time-label').innerText = t.analysisLabel + currentTimeValue;
            }

            // 5. Экран 3: Кнопка и Статусы
            document.getElementById('get-btn').innerText = t.getSignal;
            
            const card = document.getElementById('sigCard');
            const output = document.getElementById('sig-output');
            const status = document.getElementById('status-text');

            if (!card.classList.contains('pulse')) {
                // Если не идет анализ, переводим текущий результат
                if (output.innerText === 'READY' || output.innerText === 'ГОТОВ') {
                    output.innerText = t.ready;
                    status.innerText = t.statusReady;
                } else if (output.innerText === 'UP' || output.innerText === 'ВВЕРХ') {
                    output.innerText = t.up;
                    status.innerText = t.statusDone;
                } else if (output.innerText === 'DOWN' || output.innerText === 'ВНИЗ') {
                    output.innerText = t.down;
                    status.innerText = t.statusDone;
                }
            } else {
                // Если идет анализ
                output.innerText = t.wait;
                status.innerText = t.statusScanning;
            }
        }

        function toggleLang() {
            lang = lang === 'ru' ? 'en' : 'ru';
            document.getElementById('lang-toggle').innerText = lang === 'ru' ? 'EN' : 'RU';
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            activeScreen = id;
            document.getElementById('back-icon').style.display = id === 'main' ? 'none' : 'block';
            updateUI();
            window.scrollTo(0,0);
        }

        function toTimer(symbol, name) {
            currentSymbol = symbol;
            currentPairName = name;
            switchScreen('timer');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function toTrade(time) {
            currentTimeValue = time;
            document.getElementById('display-pair').innerText = currentPairName;
            switchScreen('trade');
            
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "symbol": "OANDA:" + currentSymbol,
                    "container_id": "hidden-chart"
                });
            }
        }

        function goBack() {
            if(activeScreen === 'trade') switchScreen('timer');
            else if(activeScreen === 'timer') switchScreen('main');
        }

        function runAnalysis() {
            const btn = document.getElementById('get-btn');
            const card = document.getElementById('sigCard');
            const txt = document.getElementById('sig-output');
            const img = document.getElementById('sigImg');
            const status = document.getElementById('status-text');

            btn.disabled = true;
            card.classList.add('pulse');
            img.style.display = 'none';
            updateUI(); // Обновит текст на "WAIT" и "Scanning"
            
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                const isUp = Math.random() > 0.5;
                btn.disabled = false;
                card.classList.remove('pulse');
                img.style.display = 'block';

                if(isUp) {
                    img.src = 'up.png';
                    txt.innerText = translations[lang].up;
                    txt.style.color = 'var(--success)';
                    card.style.borderColor = 'var(--success)';
                } else {
                    img.src = 'down.png';
                    txt.innerText = translations[lang].down;
                    txt.style.color = 'var(--danger)';
                    card.style.borderColor = 'var(--danger)';
                }
                status.innerText = translations[lang].statusDone;
                tg.HapticFeedback.notificationOccurred('success');
            }, 2500);
        }

        // Первичная инициализация
        updateUI();
    </script>
</body>
</html>
