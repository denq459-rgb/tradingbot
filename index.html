<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlfaBit Forex Predictor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #181a20;
            --accent: #98ff33;
            --text-main: #ffffff;
            --text-gray: #848e9c;
            --border-color: #2b2f36;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header {
            padding: 20px 15px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title { 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-gray); 
            text-transform: uppercase; 
            letter-spacing: 0.8px;
        }

        /* --- ЭКРАН 1: ТОРГОВЫЕ ПАРЫ --- */
        .pair-row {
            display: flex;
            align-items: center;
            padding: 16px 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .pair-row:active { background: #1e2126; }
        
        .flag-icon { 
            font-size: 20px;
            margin-right: 12px;
            width: 32px;
            text-align: center;
        }

        .pair-names {
            display: flex;
            flex-direction: column;
        }

        .symbol-main { font-size: 16px; font-weight: bold; }
        
        .tag-otc {
            font-size: 9px;
            background: rgba(255, 100, 0, 0.15);
            color: #ff6400;
            border: 1px solid #ff6400;
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 8px;
            font-weight: 900;
        }

        .trade-btn-sm { 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 800; 
            margin-left: auto; 
        }

        /* --- ЭКРАН 2: ТАЙМЕР --- */
        .timer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }
        .timer-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 22px;
            border-radius: 16px;
            text-align: center;
        }
        .timer-card:active { border-color: var(--accent); transform: scale(0.96); }
        .timer-val { font-size: 26px; font-weight: 900; color: var(--accent); display: block; }
        .timer-desc { font-size: 10px; color: var(--text-gray); text-transform: uppercase; margin-top: 6px; }

        /* --- ЭКРАН 3: ТОРГОВЛЯ --- */
        .chart-box { width: 100%; height: 300px; background: #000; }
        .signal-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .hexagon {
            position: relative; 
            width: 120px; 
            height: 140px; 
            background: var(--card-bg); 
            border: 2px solid var(--accent);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 25px;
        }
        .action-btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            border-radius: 14px; 
            font-weight: 900; 
            font-size: 16px; 
            box-shadow: 0 5px 15px rgba(152, 255, 51, 0.2);
        }

        .pulse { animation: pulseAnim 1.5s infinite; }
        @keyframes pulseAnim { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ВЫБОР ВАЛЮТНЫХ ПАР -->
    <div id="screen-main" class="screen active">
        <div class="header"><span class="header-title">Валютные пары ↕</span></div>
        
        <div class="pair-row" onclick="toTimer('EURUSD', 'EUR / USD')">
            <div class="flag-icon">🇪🇺</div>
            <div class="pair-names"><span class="symbol-main">EUR / USD</span></div>
            <span class="tag-otc">OTC</span>
            <button class="trade-btn-sm">Торговать</button>
        </div>

        <div class="pair-row" onclick="toTimer('GBPUSD', 'GBP / USD')">
            <div class="flag-icon">🇬🇧</div>
            <div class="pair-names"><span class="symbol-main">GBP / USD</span></div>
            <span class="tag-otc">OTC</span>
            <button class="trade-btn-sm">Торговать</button>
        </div>

        <div class="pair-row" onclick="toTimer('USDJPY', 'USD / JPY')">
            <div class="flag-icon">🇺🇸</div>
            <div class="pair-names"><span class="symbol-main">USD / JPY</span></div>
            <button class="trade-btn-sm">Торговать</button>
        </div>

        <div class="pair-row" onclick="toTimer('AUDUSD', 'AUD / USD')">
            <div class="flag-icon">🇦🇺</div>
            <div class="pair-names"><span class="symbol-main">AUD / USD</span></div>
            <span class="tag-otc">OTC</span>
            <button class="trade-btn-sm">Торговать</button>
        </div>

        <div class="pair-row" onclick="toTimer('USDCHF', 'USD / CHF')">
            <div class="flag-icon">🇨🇭</div>
            <div class="pair-names"><span class="symbol-main">USD / CHF</span></div>
            <button class="trade-btn-sm">Торговать</button>
        </div>

        <div class="pair-row" onclick="toTimer('EURGBP', 'EUR / GBP')">
            <div class="flag-icon">🇪🇺</div>
            <div class="pair-names"><span class="symbol-main">EUR / GBP</span></div>
            <span class="tag-otc">OTC</span>
            <button class="trade-btn-sm">Торговать</button>
        </div>
    </div>

    <!-- ЭКРАН 2: ВЫБОР ТАЙМЕРА -->
    <div id="screen-timer" class="screen">
        <div class="header">
            <div onclick="showScreen('screen-main')" style="color:var(--accent); cursor:pointer; font-size:20px;">❮</div>
            <span class="header-title">Время экспирации</span>
        </div>
        <div class="timer-grid">
            <div class="timer-card" onclick="toTrade('5s')"><span class="timer-val">5s</span><span class="timer-desc">Ultra Fast</span></div>
            <div class="timer-card" onclick="toTrade('15s')"><span class="timer-val">15s</span><span class="timer-desc">Fast</span></div>
            <div class="timer-card" onclick="toTrade('30s')"><span class="timer-val">30s</span><span class="timer-desc">Stable</span></div>
            <div class="timer-card" onclick="toTrade('1m')"><span class="timer-val">1m</span><span class="timer-desc">Normal</span></div>
        </div>
    </div>

    <!-- ЭКРАН 3: АНАЛИЗ -->
    <div id="screen-trade" class="screen">
        <div class="header">
            <div onclick="showScreen('screen-timer')" style="color:var(--accent); cursor:pointer; font-size:20px;">❮</div>
            <div style="display:flex; flex-direction:column;">
                <span id="active-pair" style="font-size:14px; font-weight:bold;">EUR/USD</span>
                <span id="active-timer" style="font-size:10px; color:var(--accent); font-weight:800;">АНАЛИЗ: 5s</span>
            </div>
        </div>

        <div id="chart" class="chart-box"></div>

        <div class="signal-area">
            <div class="hexagon" id="sigBox">
                <div id="sig-icon" style="font-size:32px;">📡</div>
                <div id="sig-text" style="font-weight:900; margin-top:5px; letter-spacing:1px;">READY</div>
            </div>
            <button class="action-btn" id="aiBtn" onclick="startScan()">ПОЛУЧИТЬ СИГНАЛ</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#181a20";
        
        let selectedPair = "";
        let selectedSymbol = "";

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function toTimer(symbol, pairName) {
            selectedSymbol = symbol;
            selectedPair = pairName;
            showScreen('screen-timer');
        }

        function toTrade(time) {
            document.getElementById('active-pair').innerText = selectedPair;
            document.getElementById('active-timer').innerText = "АНАЛИЗ: " + time;
            showScreen('screen-trade');
            
            new TradingView.widget({
                "autosize": true,
                "symbol": "OANDA:" + selectedSymbol,
                "interval": "1",
                "theme": "dark",
                "style": "1",
                "locale": "ru",
                "hide_top_toolbar": true,
                "container_id": "chart"
            });
        }

        function startScan() {
            const btn = document.getElementById('aiBtn');
            const box = document.getElementById('sigBox');
            const icon = document.getElementById('sig-icon');
            const text = document.getElementById('sig-text');

            btn.disabled = true;
            box.classList.add('pulse');
            icon.innerText = '⚙️';
            text.innerText = 'АНАЛИЗ...';
            text.style.color = '#fff';
            box.style.borderColor = "#98ff33";
            
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                const isUp = Math.random() > 0.5;
                btn.disabled = false;
                box.classList.remove('pulse');
                
                if(isUp) {
                    icon.innerText = '📈';
                    text.innerText = 'ВВЕРХ';
                    text.style.color = '#02c076';
                    box.style.borderColor = '#02c076';
                } else {
                    icon.innerText = '📉';
                    text.innerText = 'ВНИЗ';
                    text.style.color = '#cf304a';
                    box.style.borderColor = '#cf304a';
                }
                tg.HapticFeedback.notificationOccurred('success');
            }, 2200);
        }
    </script>
</body>
</html>
