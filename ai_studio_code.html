<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0b0e11;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
        }

        .hexagon {
            width: 150px;
            height: 170px;
            background-color: #1e2329;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            border: 2px solid #f0b90b;
            transition: 0.3s;
        }

        #signal-text {
            font-size: 24px;
            font-weight: bold;
        }

        .btn-analyze {
            background: linear-gradient(45deg, #f0b90b, #f3ba2f);
            border: none;
            padding: 15px 30px;
            color: black;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(240, 185, 11, 0.4);
            width: 100%;
        }

        #loader {
            display: none;
            margin: 10px;
            color: #f0b90b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #f0b90b;">ADVANCED AI BOT</h2>
    <p>Market: <span id="market-pair">EUR/USD OTC</span></p>

    <div class="hexagon">
        <div id="signal-display">
            <span id="signal-text">READY</span>
        </div>
    </div>

    <div id="loader">SCANNING MARKET...</div>

    <p>AI Accuracy: <span id="accuracy" style="color: #00ff00;">--</span></p>
    
    <button class="btn-analyze" onclick="getSignal()">GET AI SIGNAL</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand(); // Расширить на весь экран

    async function getSignal() {
        const loader = document.getElementById('loader');
        const signalText = document.getElementById('signal-text');
        const accuracyText = document.getElementById('accuracy');

        loader.style.display = 'block';
        signalText.innerText = '...';

        // Имитируем запрос к вашему бэкенду
        try {
            // Замените URL на ваш реальный адрес бэкенда
            // const response = await fetch('https://your-api.com/get-signal');
            // const data = await response.json();
            
            // Имитация задержки "анализа"
            setTimeout(() => {
                const results = ['UP 🟢', 'DOWN 🔴'];
                const result = results[Math.floor(Math.random() * results.length)];
                
                loader.style.display = 'none';
                signalText.innerText = result;
                accuracyText.innerText = (Math.random() * (98 - 89) + 89).toFixed(2) + '%';
                
                tg.HapticFeedback.notificationOccurred('success'); // Вибрация
            }, 2000);

        } catch (error) {
            signalText.innerText = 'ERROR';
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
